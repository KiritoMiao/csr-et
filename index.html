<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Sapphire Reserve Exclusive Tables — Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;height:100vh;background:#f5f5f5}
#sidebar{width:380px;height:100vh;display:flex;flex-direction:column;background:#fff;border-right:1px solid #ddd;overflow:hidden;z-index:1000}
#sidebar-header{padding:16px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff}
#sidebar-header h1{font-size:18px;margin-bottom:4px;letter-spacing:0.5px}
#sidebar-header .subtitle{font-size:12px;color:#a0c4ff;margin-bottom:12px}
.filters{padding:12px 16px;border-bottom:1px solid #eee;background:#fafafa}
.filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-row:last-child{margin-bottom:0}
.city-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.2s}
.city-btn:hover{border-color:#888}
.city-btn.active{color:#fff;border-color:transparent}
.city-btn[data-city="all"].active{background:#333;color:#fff}
.city-btn[data-city="Chicago"].active{background:#2563eb}
.city-btn[data-city="Los Angeles"].active{background:#ea580c}
.city-btn[data-city="New York City"].active{background:#dc2626}
.city-btn[data-city="Portland"].active{background:#7c3aed}
.city-btn[data-city="San Francisco"].active{background:#16a34a}
#cuisine-filter{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;cursor:pointer}
.count-bar{padding:8px 16px;font-size:12px;color:#666;border-bottom:1px solid #eee;background:#fafafa}
#restaurant-list{flex:1;overflow-y:auto;padding:8px}
.restaurant-card{padding:12px;margin-bottom:6px;border-radius:10px;border:1px solid #eee;cursor:pointer;transition:all 0.15s}
.restaurant-card:hover{border-color:#aaa;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.restaurant-card.active{border-color:#2563eb;background:#eff6ff;box-shadow:0 2px 12px rgba(37,99,235,0.15)}
.card-name{font-size:14px;font-weight:600;margin-bottom:3px}
.card-meta{font-size:12px;color:#666}
.card-cuisine{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-top:4px}
.city-Chicago .card-cuisine{background:#dbeafe;color:#1d4ed8}
.city-LA .card-cuisine{background:#ffedd5;color:#c2410c}
.city-NYC .card-cuisine{background:#fee2e2;color:#b91c1c}
.city-Portland .card-cuisine{background:#ede9fe;color:#6d28d9}
.city-SF .card-cuisine{background:#dcfce7;color:#15803d}
.city-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
#map{flex:1;height:100vh}
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.leaflet-popup-content{margin:12px 16px;min-width:220px;max-width:300px}
.popup-name{font-size:15px;font-weight:700;margin-bottom:4px}
.popup-cuisine{font-size:12px;color:#666;margin-bottom:2px}
.popup-hood{font-size:12px;color:#888;margin-bottom:8px}
.popup-desc{font-size:12px;color:#444;line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.popup-link{display:inline-block;padding:6px 14px;background:#da3743;color:#fff;text-decoration:none;border-radius:6px;font-size:12px;font-weight:500;transition:background 0.2s}
.popup-link:hover{background:#b91c1c}
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;height:45vh;border-right:none;border-bottom:1px solid #ddd}
  #map{height:55vh}
}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Sapphire Reserve Exclusive Tables</h1>
    <div class="subtitle">Chase Sapphire Reserve x OpenTable</div>
  </div>
  <div class="filters">
    <div class="filter-row" id="city-filters">
      <button class="city-btn active" data-city="all">All Cities</button>
      <button class="city-btn" data-city="Chicago">Chicago</button>
      <button class="city-btn" data-city="Los Angeles">Los Angeles</button>
      <button class="city-btn" data-city="New York City">New York City</button>
      <button class="city-btn" data-city="Portland">Portland</button>
      <button class="city-btn" data-city="San Francisco">San Francisco</button>
    </div>
    <div class="filter-row">
      <select id="cuisine-filter"><option value="all">All Cuisines</option></select>
    </div>
  </div>
  <div class="count-bar">Showing <strong id="count">0</strong> of <strong id="total">0</strong> restaurants</div>
  <div id="restaurant-list"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
var restaurants = [
  {name:"Mott Street",cuisine:"Central Asian",neighborhood:"Bucktown / Wicker Park",city:"Chicago",description:"Supremely Asian American. Eastern cooking technique. Taking inspiration from the night markets of Asia and his Korean-American childhood, Chef Edward Kim pairs eastern cooking techniques with Chicago ingredients to create umami-laden flavors, juxtaposing tastes and textures for a wildly exciting menu. A festive and lively dining scene is anchored by a well-lauded bar program and an open pantry, inviting our guests further into the kitchen experience. Like a nightly Asian Thanksgiving, expect Feast-Style dining, rolling up your sleeves,  passing plates with your neighbors, getting sauce on your face - if you’re having a good time you’re doing it right.",url:"https://www.opentable.com/mott-street",lat:41.9177654,lng:-87.6776158},
  {name:"Alla Vita",cuisine:"Contemporary Italian",neighborhood:"West Loop",city:"Chicago",description:"Serving a casual, family-style menu, Alla Vita is a place to gather and enjoy comfortable Italian cuisine. Alla Vita means “to life” in Italian which recognizes overcoming life's challenges and creating a space for shared meals and memorable experiences. Executive Chef Lee Wolen shares his passion for fresh, delicious Italian food made simply with the best ingredients. Follow @allavitachicago to stay up-to-date with the latest happenings.",url:"https://www.opentable.com/r/alla-vita-chicago",lat:41.8846118,lng:-87.6424952},
  {name:"Momotaro",cuisine:"Japanese",neighborhood:"West Loop",city:"Chicago",description:"Momotaro is a multi-level Japanese restaurant located in the West Loop. Led by Executive Chef Gene Kato, Momotaro has had the honor of being named Restaurant of the Year in both Chicago Magazine and Chicago Social. Under Kato’s leadership the restaurant has come to define the balance between traditional values and modern technique, blending the two in a science and art that has resulted in an authentic, innovative menu. The restaurant, designed by the world renowned AvroKO, also contains the subterranean Izakaya at Momotaro (a laid back, lively lower-level bar and restaurant reminiscent of the neon-lit haunts of trendy Tokyo neighborhoods) and an elegant second floor private space that overlooks the main dining room.",url:"https://www.opentable.com/r/momotaro-chicago",lat:41.8859058,lng:-87.6484698},
  {name:"Mirra",cuisine:"Mexican",neighborhood:"Bucktown / Wicker Park",city:"Chicago",description:"Mirra is centered around the excitement of exploring the South Asian and Mexican culinary and collaboration that is really an unknown story up north. A la carte service, wine-focused with a small curated cocktail menu. Our chef's counter will offer a casual prix fixe experience for guests to enjoy. Mirra is a space that is warm, cozy, and comforting, whilst simultaneously executing a bold and vibrant food and beverage program. Mirra is a unique representation of how 2 different cultures can be 1 presented to you by Rishi Kumar, Zubair Mohajir, and David Mor.",url:"https://www.opentable.com/r/mirra-chicago",lat:41.9177654,lng:-87.6776158},
  {name:"Akahoshi Ramen",cuisine:"Japanese",neighborhood:"Logan Square",city:"Chicago",description:"Akahoshi Ramen is a humble ramen shop in the city of Chicago. Everything is made in the restaurant, including all soups, seasonings, toppings, and noodles. We are not an authentic ramen shop, though we value the history of ramen, and our ramen is influenced by its past and its future potential. The dish, popularized in Japan after World War 2, is symbolic of both struggle and perseverance. It is both a simple dish, and a fantastically complex one that we treat with reverence and respect. Roughly translating to “Red Star,” the name “Akahoshi” is a love letter to two cities; Sapporo, Hokkaido, where red stars adorn city monuments, and Chicago, Illinois, where the red star decorates the city flag. Our ramen is influenced by Japanese and American ideals in cooking.  We hope you will join us to enjoy a bowl of ramen, made with the respect and passion it deserves.",url:"https://www.opentable.com/r/akahoshi-ramen-chicago",lat:41.9240374,lng:-87.6975828},
  {name:"Fioretta",cuisine:"Steakhouse",neighborhood:"West Loop",city:"Chicago",description:"DineAmic Hospitality invites diners back in time with the latest addition to its growing portfolio of world-class restaurants, Fioretta, an Italian American Steakhouse. Located on the ground floor of global real estate developer and owner Tishman Speyer's new luxury office tower in Fulton Market District, the remarkable space is reminiscent of a new-age Copacabana, celebrating old-world Italian cuisine with an opulent twist, a steady flow of impressive cocktails and wine, world-class live entertainment, and a glamorous vibe cast over the entire experience.",url:"https://www.opentable.com/r/fioretta-chicago",lat:41.8821875,lng:-87.6530635},
  {name:"Boka",cuisine:"Contemporary American",neighborhood:"Lincoln Park",city:"Chicago",description:"Michelin-starred Boka Restaurant has been a cornerstone of Chicago’s dining scene since 2003. In 2014, following a major renovation, Chef Lee Wolen joined as Executive Chef and Partner, quickly gaining critical acclaim. Named “Chef of the Year” by both Phil Vettel of the Chicago Tribune and Eater Chicago in 2014, and again in 2015, Lee has helped elevate Boka to new heights. The restaurant offers contemporary American cuisine that highlights seasonal ingredients sourced from local farms. The sophisticated yet inviting ambiance sets the stage for an exceptional dining experience, with daily-changing tasting menus that showcase timeless and seasonal American flavors.",url:"https://www.opentable.com/r/boka-chicago",lat:41.9136386,lng:-87.6482025},
  {name:"Daisies Chicago",cuisine:"American",neighborhood:"Logan Square",city:"Chicago",description:"Midwest Italian restaurant focusing on house made pastas, utilizing vegetables from Chef Joe Frillman’s family farm. Our bakery and cafe serves La Colombe Coffee alongside an array of pastries and sandwiches crafted by Chef Leigh Omilinksy.Dinner reservations are available Tuesday - Sunday; we are closed for dinner service on Mondays. Our cafe operates from 7:00am - 3:00pm every day. Lunch is available from 11:00am - 2:00pm every day. We do not take lunch or cafe reservations, it is first come first served. Please note that there will be a 25% service charge applied to all bills. This goes to pay our staff equitably as well as provide health and other benefits not typically offered in restaurants.",url:"https://www.opentable.com/r/daisies-chicago",lat:41.9245086,lng:-87.6995198},
  {name:"avec West Loop",cuisine:"Mediterranean",neighborhood:"West Loop",city:"Chicago",description:"avec, a wine-focused restaurant in Chicago, features Midwestern takes on Mediterranean classics. Inspired by the sun-drenched wine regions of the Mediterranean, avec West Loop has been a Chicago favorite for over 20 years. Originally conceived as a wine bar, avec is the second concept from celebrated one-off hospitality, with communal and bar seating—it is a high-energy, intimate, and interactive experience.For parties of 6 or more, please call us at 312-377-2002.",url:"https://www.opentable.com/r/avec-west-loop-chicago",lat:41.8842277,lng:-87.6433844},
  {name:"Brasero",cuisine:"Contemporary American",neighborhood:"West Town",city:"Chicago",description:"Named one of Robb Report's Top 10 Best New Restaurants in the country, Brasero brings Latin American passion and Midwestern grit to Chicago's West Town neighborhood. This exciting, high-energy space showcases Chef John Manion’s wood-fired, South American inspired cooking, culminating from decades of experience. Brasero showcases the traditions of South American wood fired cooking with flame grilled steaks and shellfish, refreshing crudos and ceviche, and other seasonally inspired dishesBrasero boasts an exclusively South American wine list with 100 bottles of wine under $100 dollars for you to explore along with cold cocktails and local beers. Join us every Sunday at the bar for all day Happy Hour or Wednesday for 6 bottles of wine for $60 each curated by our Wine Director.For reservations of groups of 7 or more, email us at info@braserochicago.com or call (872)342-2079. We ask that these parties participate in one of our two large party menus. For more details, please contact us.",url:"https://www.opentable.com/r/brasero-chicago",lat:41.8958975,lng:-87.6701778},
  {name:"avec River North",cuisine:"Mediterranean",neighborhood:"River North (Chicago)",city:"Chicago",description:"Located in the heart of River North, avec features Midwestern takes on Mediterranean classics under the culinary direction of James Beard award-winning chef, Paul Kahan, and executive chef Dylan Patel.  Pair your meal with an incredible array of carefully chosen wines curated by wine director Bret Heiar, or simply stop by for a delicious cocktail at our expansive bar.",url:"https://www.opentable.com/r/avec-river-north-chicago",lat:41.8937721,lng:-87.6329701},
  {name:"Chicago Cut Steakhouse",cuisine:"Steakhouse",neighborhood:"River North (Chicago)",city:"Chicago",description:"Chicago Cut Steakhouse is one of Chicago’s most iconic dining experiences in a city that boasts dozens of options for steak-centric dining. Our downtown Chicago steakhouse offers guests a selection of signature, USDA-certified prime beef that is hand-cut and dry-aged on site. Our curated menu also features fish, shellfish, chops and a selection of unique side dishes and appetizers. In addition to delicious martinis and specialty cocktails, Chicago Cut offers a wine list with more than 600 bottles that has been highlighted Wine Spectator, the world’s leading authority on wine. Our dining area features a lively bar scene, vibrant red velvet banquettes and spacious dining tables, private dining options and beautiful, sweeping views of the Chicago River. In the warm months, we also open our sprawling outdoor dining patio, which makes Chicago Cut an excellent spot for an outdoor brunch, lunch or dinner reservation along the river.",url:"https://www.opentable.com/chicago-cut-steakhouse",lat:41.8881786,lng:-87.6333711},
  {name:"Ever",cuisine:"American",neighborhood:"West Loop",city:"Chicago",description:"Two-Michelin-starred culinary masterpiece of Chef Curtis Duffy. Every aspect of the dining experience is meticulously crafted, from the architectural design and ambiance to the precise execution of each dish. Chef Duffy transforms seasonal ingredients into an immersive tasting menu that is both thoughtful and daring, a culinary journey designed to captivate the senses, evoke emotions, and inspire awe.",url:"https://www.opentable.com/r/ever-chicago",lat:41.8868452,lng:-87.660486},
  {name:"The Publican",cuisine:"American",neighborhood:"West Loop",city:"Chicago",description:"A Fulton Market Feast, Rooted in the MidwestThe Publican is a celebrated Chicago restaurant in the heart of Fulton Market, built on connection—between land and sea, farmer and table, guest and host. Our farm-to-table menu highlights what’s fresh and in season: oysters and shellfish from our raw bar, inventive vegetable plates, heritage pork, housemade charcuterie, and globally inspired seafood dishes.Patio seating is first come, first served. Walk-ins are always welcome!",url:"https://www.opentable.com/r/the-publican-chicago",lat:41.8821875,lng:-87.6530635},
  {name:"Hawksmoor Chicago",cuisine:"Steakhouse",neighborhood:"River North (Chicago)",city:"Chicago",description:"Welcome to Hawksmoor Chicago, our biggest and boldest steakhouse yet, located in the iconic LaSalle Powerhouse in River North. We've brought everything we've learned from nearly 20 years in the UK, Ireland and the US to create something genuinely special in downtown Chicago - a city that knows and loves great steak.  Named the World's Best Steak Restaurant and a James Beard Foundation semi-finalist, Hawksmoor is built on a simple philosophy: buy the best and let it shine. That means incredible beef from family-run farms across the Northeast and Pacific Northwest, cooked over open fire. Our responsibly sourced seafood from the Northeast is treated with the same care.  In our 16,500 sq ft space, with barrel-vaulted ceilings and touches from Chicago's Golden Age of Travel, you'll find world-class dining without formality - no stiff uniforms or scripts, just relaxed, knowledgeable teams who love what they do.  Join us for Happy Hour (daily 5-6pm), and our award-winning Sunday Roast.",url:"https://www.opentable.com/r/hawksmoor-chicago",lat:41.9816962,lng:-87.7425357},
  {name:"Thattu",cuisine:"Indian",neighborhood:"Avondale",city:"Chicago",description:"Comfort food from Kerala, India's spice garden. Thattu is located in the beautiful Chicago neighborhood of Avondale. It was born of Chef Margaret Pak’s love for the southwest Indian coastal cuisine of Kerala. Our menu brings you traditions of Kerala along with playful interpretations from our culinary team. Rich with aromatic spices, coconut and curry leaves, the cuisine is a celebration of the bounty of the land and the sea.",url:"https://www.opentable.com/r/thattu-chicago",lat:41.9388273,lng:-87.7112994},
  {name:"After",cuisine:"Cocktail Bar",neighborhood:"West Loop",city:"Chicago",description:"High Craft, Low KeyAfter isn’t about white tablecloths or hushed voices. It’s about unmatched cocktails, loud laughter, good music, and an authentically laid-back spirit. It’s a come-as-you-are bar—because a great drink should make you feel something, not just impress you.Opened by Michelin-starred Chef Curtis Duffy reinventing what a cocktail bar can be—seasonal, boundary-pushing drinks, grounded in technique, built for fun. After is where culinary precision meets barroom revelry. After was named one of the United States' Top 15 bars by Food & Wine in Spring 2024. In 2023, Esquire put After on their Best Bars in America list. The New York Times featured After in their 2023 \"36 Hours in Chicago.\"",url:"https://www.opentable.com/r/after-chicago",lat:41.8868454,lng:-87.660377},
  {name:"Valhalla",cuisine:"Contemporary American",neighborhood:"Bucktown / Wicker Park",city:"Chicago",description:"Valhalla is a culinary gem in Chicago's Wicker Park, offering a unique gastronomic journey where modern elegance meets global flavors. The minimalist Scandinavian decor creates an intimate atmosphere, with warm woods and soft lighting that enhance your dining experience.   Chef Stephen Gillanders' tasting menu showcases his creativity, featuring seasonal ingredients and diverse influences. Each course, from ocean trout lumpia to vibrant seafood ceviche, highlights his mastery of flavor and technique.   Desserts by Pastry Chef Tatum Sinclair are a revelation, with each creation a stunning masterpiece that delights the senses.   Valhalla is not just a restaurant; it's an unforgettable experience that invites you to savor every moment.",url:"https://www.opentable.com/r/valhalla",lat:41.9177654,lng:-87.6776158},
  {name:"Sepia",cuisine:"Contemporary American",neighborhood:"West Loop",city:"Chicago",description:"Located in Chicago’s West Loop, Sepia offers a dining experience defined by warmth, refinement, and quiet sophistication. Wooden walls, exposed brick, and thoughtfully curated vintage décor create a space that feels cozy and familiar, inviting guests to dine as though welcomed into someone’s home. That same sense of care extends to the cuisine. Sepia’s ingredient-driven menu is guided by respect for integrity and seasonality, allowing quality to lead. Under the direction of Chef Kyle Cottle, the kitchen presents inventive American cooking rooted in tradition, where technique enhances, rather than overshadows, the natural character of each ingredient. Together, the space and the food reflect Sepia’s enduring philosophy: thoughtful craftsmanship, genuine hospitality, and an experience that feels both elevated and deeply personal. To book reservations of 7 or larger, please email info@sepiachicago.com",url:"https://www.opentable.com/r/sepia-chicago",lat:41.883943,lng:-87.6425174},
  {name:"Bronzeville Winery",cuisine:"Contemporary American",neighborhood:"Bronzeville",city:"Chicago",description:"Bronzeville Winery is a destination where exceptional food, fine wine, and vibrant energy come together. The menu offers seasonal small plates, artisanal cheese boards, seasonal large plates, and a variety of vegan and vegetarian options, ensuring there’s something for every palate. From indulgent Sunday brunch to curated wine and whiskey tasting flights, each visit is a celebration of flavor and creativity. Located just moments away from U Chicago , Hyde Park and 3 minutes from Lake Shore Drive.BW sets the perfect mood with live music every Wednesday and Sunday & DJs for the vibe Thursday - Saturday. Stop by for Happy Hour Wednesdays & Thursdays from 4–6 or gather for unforgettable celebrations, birthdays & dates —whether it’s a party of 30 or a buyout for 200 guests.As the 2023 Jean Banchet Award Winner for Best Hospitality, Bronzeville Winery offers an unmatched combination of warm service, a welcoming atmosphere, and a soulful connection to Chicago’s rich cultural heritage.",url:"https://www.opentable.com/r/bronzeville-winery-chicago",lat:41.8313395,lng:-87.6171533},
  {name:"Mariscos San Pedro",cuisine:"Mexican",neighborhood:"Pilsen",city:"Chicago",description:"Mariscos San Pedro is a new Mexican seafood restaurant located in the heart of Pilsen neighborhood in the former Dusek’s restaurant space. Featuring sustainably sourced seafood, a finely curated wine list, seasonal cocktails, and superb spirit list from the trios of chefs of the acclaimed Le Bouchon, Obelix, and Taqueria Chingon. Within the same walls you will find premier music venue Thalia Hall, cocktail bar Punch House, and piano bar Tack Room.",url:"https://www.opentable.com/r/mariscos-san-pedro-chicago",lat:41.8578003,lng:-87.6574498},
  {name:"PERILLA korean steakhouse",cuisine:"Korean",neighborhood:"Downtown / Loop",city:"Chicago",description:"PERILLA Steakhouse is a modern Korean steakhouse in downtown Chicago, reimagining the city’s classic steakhouse tradition through bold Korean flavors. Featuring custom tabletop grills and an intimate Chef’s Counter tasting experience, the restaurant is led by a team with MICHELIN-recognized experience.",url:"https://www.opentable.com/r/perilla-korean-steakhouse-chicago",lat:41.8816746,lng:-87.6321072},
  {name:"Anelya",cuisine:"Ukrainian",neighborhood:"Avondale",city:"Chicago",description:"Comforting favorites in Avondale by Chefs Johnny Clark and Beverly Kim inspired by old-world cooking. Start your meal with a selection of beverages like a bottle of trendy orange wine or head to the bar after work with no reservation needed for a craft cocktail like The Muse with gin and beet kvass. Our appetizer cart will roll to your table to start your dinner with over 10 bites beckoning to be picked like our fan-favorite smoked carrot paté or sunflower seed hummus. Our main dishes offer a variety of homestyle flavors just like your mother made from thick soups to layered pasta and fluffy Ukrainian garlic bread. Coffee, after-dinner drinks and a flaky pastry like our Napoleon invite you to finish the meal with a sweet treat and hours of good conversation in a space that feels like home.",url:"https://www.opentable.com/r/anelya-chicago",lat:41.9388273,lng:-87.7112994},
  {name:"Khmai",cuisine:"Cambodian",neighborhood:"North of Foster / Rogers Park",city:"Chicago",description:"Khmai Cambodian is a culinary journey that celebrates rich heritage and indomitable spirit of Cambodia. Named as an homage to Khmer, the native language, Mai means mother, which pays homage to Chef's mother.  Our restaurant is a testament to the enduring bond between family and food.Khmai Cambodian is inspired by the childhood experiences of our founder, Mona Sang, and her mother, Sarom Sang, who survived the Cambodian genocide. Our menu pays tribute to their unwavering resilience and passion for cooking. As a 2023 James Beard Semifinalist for Best New Restaurant, Khmai Cambodian has earned acclaim for its commitment to preserving and showcasing Cambodia's culinary heritage.Also enjoy our new concept Kaun Khmai, where the spirit of Cambodia comes alive through bold flavors and vibrant experiences. Translated as \"Children of Cambodia,\" our lively, casual atmosphere invites you to explore an innovative, modern, and generational twist.",url:"https://www.opentable.com/r/khmai-chicago",lat:41.9745,lng:-87.6762},
  {name:"Cariño",cuisine:"Latin American",neighborhood:"Uptown",city:"Chicago",description:"Cariño1. (afecto) love ⧫ affection2. (apelativo) darling ⧫ honeyCariño is a Spanish word that refers to a feeling of fondness or love that a person has for someone or something.This concept is an immersive culinary journey offering a Latin-inspired tasting menu and taco omakase by Chef Norman Fenton. Each dish has been meticulously crafted to highlight the rich tapestry of flavors and ingredients found across Latin America. These unique combinations of traditional and contemporary techniques, promise to deliver an elevated dining experience that surprises and delights.Every little detail of Cariño's intimate setting is deeply personal and tells a story rooted in family and love of craft offering each guest an opportunity for a truly memorable dining experience.",url:"https://www.opentable.com/r/carino-chicago-2",lat:41.9668838,lng:-87.6587377},
  {name:"Moody Tongue Brewing Company",cuisine:"Brewery",neighborhood:"South Loop",city:"Chicago",description:"Founded in 2014 in Chicago by cousins Jared Rouben (Brewmaster) and Jeremy Cohn (CEO), Moody Tongue is built on the philosophy of culinary brewing, appealing to those with a discerning palate or, as Rouben describes, a \"moody tongue.\" Utilizing his extensive culinary background and brewing education, Rouben approaches brewing with a chef's mindset. In 2019, the brewery relocated and expanded to launch two dining concepts: (1) a lively, à la carte restaurant, THE BAR, and (2) an elevated, intimate fine dining restaurant, THE DINING ROOM, helmed by Executive Chef James Bingham. Since opening, Moody Tongue has been honored to receive stars in the Chicago MICHELIN Guide in 2021, 2022, 2023 and 2024.Please note: our tasting menu is exclusively available in The Dining Room; our a la carte menu is exclusively available in The Bar.For parties with 7+ guests, please e-mail contact@moodytongue.com for reservation inquiries as well as information regarding Semi-Private and Private Events.",url:"https://www.opentable.com/r/moody-tongue-brewing-company-chicago",lat:41.8657843,lng:-87.6257625},
  {name:"Dunsmoor",cuisine:"American",neighborhood:"Eagle Rock",city:"Los Angeles",description:"Brian Dunsmoor’s namesake restaurant, Dunsmoor, is the latest iteration of his ongoing exploration of American heritage cooking. It is, first and foremost, a restaurant for the community that surrounds it, and a loving expression of the relentless research that has informed his cooking for the last ten years.We offer the full menu at tables in our dining room and at the chef's counter. Reservations are recommended but we make every effort to accommodate walk-ins when possible. Dunsmoor's wine bar, accessible either through the restaurant or via its own door on Ave 35, does not accept reservations and serves a limited menu of our raw and larder items.",url:"https://www.opentable.com/r/dunsmoor-los-angeles",lat:34.1390325,lng:-118.2140958},
  {name:"Loreto",cuisine:"Mexican",neighborhood:"Atwater Village",city:"Los Angeles",description:"Bathed by the Pacific Ocean to the West and by the Mar de Cortés to the East, California’s Peninsula is layered with a rich history of cultures reinventing seafood with bold flavors. At our Barra de Peninsula we serve the best bounty that these Oceans have to offer, and we celebrate the people who make our coasts so delicious, from Uni and clam divers to the Concheros in Baja and much more.We love celebrating special occasions! While we don’t offer complimentary desserts, we’re happy to add a candle to any dessert you order.Please note: All credit card payments will incur a 3% processing fee. You may use a debit card to avoid this charge. Thank you for your cooperation, and looking forward on hosting you!We love having little ones join us! For everyone's safety, children must remain supervised and seated during service. Our team carries hot dishes and works in tight spaces — we just want to keep everyone safe and happy!",url:"https://www.opentable.com/r/loreto-los-angeles",lat:34.1186975,lng:-118.2623924},
  {name:"Gwen",cuisine:"Contemporary American",neighborhood:"Hollywood",city:"Los Angeles",description:"Gwen Butcher Shop & Restaurant is the second restaurant from fine dining chef Curtis Stone (of Maude) and the first he’s opened with his brother Luke Stone. Gwen is both a European-style, chef-driven butcher shop and a restaurant that is redefining dining in LA, with a menu that calls on fire-based cooking techniques. Whether you’re picking up house-made charcuterie, prime and rare breed meats from the retail store, enjoying a feast in the dining room or relaxing with a bite and cocktail at the bar, Gwen delivers the highest standards of quality, taste and service. If you have any questions, please feel free to call the restaurant at 323-946-7500.",url:"https://www.opentable.com/r/gwen-los-angeles",lat:34.0978014,lng:-118.3333933},
  {name:"Majordōmo",cuisine:"American",neighborhood:"Downtown",city:"Los Angeles",description:"Majordōmo, from Dave Chang and Momofuku, serves California cuisine inspired by the different food cultures present in Los Angeles and the bounty of Southern California products. In a sleek, industrial setting with a sun-soaked patio and full bar, Majordōmo offers various ways to dine for groups of all sizes. Executive Chef James Bailey highlights California’s bounty through knockout large format dishes like whole plate short rib and smoked bo ssäm to a constantly changing roster of bings & dips.",url:"https://www.opentable.com/r/majordomo-los-angeles",lat:34.047996,lng:-118.2521002},
  {name:"Camélia",cuisine:"French / Japanese",neighborhood:"Arts District",city:"Los Angeles",description:"A French-Japanese bistro in the Arts District of Downtown Los Angeles. From July 23 to July 26, we’ll be hosting a multi-night experience exclusively for Chase Sapphire Reserve® cardmembers. Book now: https://www.opentable.com/r/camelia-la/sapphire-summer-reservedReservations are always recommended, but we are often able to accommodate walk-ins as well. While we love dogs, we can only accept trained service animals (not emotional support animals) both in our dining room as well as on our outdoor patio. We appreciate your understanding.",url:"https://www.opentable.com/r/camelia-los-angeles",lat:34.0412389,lng:-118.2344503},
  {name:"Meteora",cuisine:"Californian",neighborhood:"Hollywood",city:"Los Angeles",description:"Ignite your senses at Meteora, a dynamic one-star Michelin restaurant by Chef Jordan Kahn (Vespertine, Destroyer). Dinner here showcases live-fire cooking, seasonal ingredients, and flavors inspired by Chef Jordan's travels.  The wine list, curated by wine director James Saidy, spans the globe, emphasizing terroir, expression, and passion. Meanwhile, our bar program highlights artisanal cocktails, ancestral spirits, and exotic ingredients to enhance your dining experience.Created in collaboration with Roth Architecture and Ov&Co, the transportive setting inspires and revitalizes with its lush greenery, rich woods, and artisan-made accents.For private gatherings, groups of 8 to 12 can enjoy our private dining room, The Nest. Groups of 6 to 7 can opt for our semi-private Selenite Crystal Chef’s Table, situated near the kitchen and nestled within a sculpted shell.",url:"https://www.opentable.com/r/meteora-los-angeles-2",lat:34.0980031,lng:-118.329523},
  {name:"chi SPACCA",cuisine:"Italian",neighborhood:"Hollywood",city:"Los Angeles",description:"Heralded as a \"meat speakeasy\" by Food & Wine Magazine, chi SPACCA has come to represent the quintessential new Italian dining experience, where accompaniments like the Foccacia di Recco, warm salted Medjool dates, and Culatello & Puglia burrata are just sideshows for the rest of Chef Alisa Vannah's wood-fired menu which features a 42-ounce Tomahawk pork chop, a 36-ounce dry-aged bone-in New York Costata alla Fiorentina, and a 50-ounce dry-aged porterhouse Bistecca Fiorentina.Enchanted by the artistry of Italian salumi culture, we built the first “dry cure” program in Los Angeles so that we could experiment and perfect Italian charcuterie techniques in house.",url:"https://www.opentable.com/r/chi-spacca-los-angeles",lat:34.0980031,lng:-118.329523},
  {name:"Ronan",cuisine:"Pizzeria",neighborhood:"West Hollywood",city:"Los Angeles",description:"Ronan is a modern pizzeria run by Chef Daniel Cutler and his wife Caitlin.  Taking inspiration from their training in classic Southern Italian cuisine, and their passion for Southern California, Daniel and Caitlin have built a playful yet upscale pizzeria.  With a string lit covered patio and an industrial chic interior, Ronan is equally perfect for a casual weeknight dinner or a special celebration with a large group.   Craft cocktails from bar director Jeremy Wade and natural wines hand selected by Caitlin keep the good times flowing.",url:"https://www.opentable.com/r/ronan-los-angeles",lat:34.0923014,lng:-118.3692894},
  {name:"Steak 48 - Beverly Hills",cuisine:"Steakhouse",neighborhood:"Beverly Hills",city:"Los Angeles",description:"At Steak 48, we serve the finest steaks and high-quality seafood in an intimate and vibrant setting. Our diverse menu will satisfy any personal craving, as we serve the best USDA prime steaks, succulent seafood, and shellfish along with inventive and classically inspired side dishes and appetizers. Also enjoy classic cocktails and an extensive award-winning wine list. At Steak 48, We encourage all of our guests to get dressed up for a great experience, here is a link to our dress code that you can share with your guests. https://www.steak48.com/steakhouses/beverly-hills/dress-code/Please dress as your elegant selves. You are going to have a great time!If you need any special accommodations or flowers reach out to us at the host desk! We look forward to seeing you soon!",url:"https://www.opentable.com/r/steak-48-beverly-hills",lat:34.0696501,lng:-118.3963062},
  {name:"Delilah - Los Angeles",cuisine:"American",neighborhood:"West Hollywood",city:"Los Angeles",description:"Swing and jive through this homage to the roaring ‘20s. With its lavish chandeliers and plush interiors, Delilah is a modern-day supper club with a vintage aesthetic. Nostalgic touches like a crackling fireplace offer a warm and welcoming atmosphere as guests dine on refined American fare. Dining turns to dancing as a troupe of female entertainers move to the sounds of a live jazz band. Eating, drinking, and dancing converge in this luxury space as guests enjoy lounge style bottle service as the evening unfolds. Elegant yet alluring, the charm and vivacious energy of Delilah is like stepping back in time.Delilah has a 15 minute grace period for each reservation. Each reservation is allotted 2 hours. Please note, should we not get confirmation by 4pm on the day of your reservation, your table may be released. Dress Code: Smart Causal, No Shorts",url:"https://www.opentable.com/r/delilah-los-angeles-west-hollywood",lat:34.0923014,lng:-118.3692894},
  {name:"The Nice Guy",cuisine:"Italian",neighborhood:"West Hollywood",city:"Los Angeles",description:"Tucked away in the heart of West Hollywood, The Nice Guy is an intimate restaurant and lounge, complete with world-class culinary offerings. A step above a restaurant, but not quite a club, the venue is a cozy, reservations-only destination for h.wood friends and family. Its aesthetic evokes the decadent lore of mafia bars and restaurants, where the owners and their friends could enjoy an evening together. Whether grabbing an early dinner or mingling into the early morning hours, the space cultivates a feeling of camaraderie among its clientele, which keeps guests coming back night after night.",url:"https://www.opentable.com/the-nice-guy",lat:34.0923014,lng:-118.3692894},
  {name:"La Dolce Vita",cuisine:"Italian",neighborhood:"Beverly Hills",city:"Los Angeles",description:"La Dolce Vita opened its' doors in Beverly Hills in 1966.  The biggest celebrities in the world lived only moments away, and La Dolce Vita literally became their second home for decades to come.  Regulars included the Sinatras, the Reagans, the Pecks, the Douglases, and the Bloomingdales.  It hosted every sitting US President since the Kennedy administration, and was known as a haven for titans of industry and finance. Deals were made with a handshake, and everyone was certain to arrive on Thursdays for Osso Bucco.  Now, La Dolce Vita moves to the future, following a seven month 'facelift,' during which the restaurant was restored to its' original pristine condition, reprieving the original menu, recipes, and decor.  La Dolce Vita arrives once again as a popular dining and entertainment destination, now home to young Hollywood and those seeking the traditional cuisine of Italy.",url:"https://www.opentable.com/r/la-dolce-vita-beverly-hills",lat:34.0674902,lng:-118.4091621},
  {name:"Super Peach",cuisine:"Asian",neighborhood:"Century City",city:"Los Angeles",description:"Super Peach is an American restaurant with Korean influences from David Chang and the Momofuku team.",url:"https://www.opentable.com/r/super-peach-huntington-beach",lat:34.057359,lng:-118.4146125},
  {name:"Vespertine",cuisine:"Californian",neighborhood:"Culver City",city:"Los Angeles",description:"Vespertine is Chef Jordan Kahn's culinary symphony. More than a restaurant, Vespertine transports diners through the twisted steel and glass structure designed by acclaimed architect Eric Owen Moss. Food, beverage, music, and art are woven throughout, creating an evocative and immersive evening. Its cuisine exalts exceptional, rare, and thoughtfully sourced ingredients, employing newly invented techniques to create moments of magic, surprise, and delight. Bold and soulful compositions uncover harmonies hidden within. Coupled with heartfelt hospitality and rich storytelling, this is a dining experience where guests leave feeling inspired and renewed. Awards Include:2 Stars - Michelin Guide, 2019 - 2025Green Star - Michelin Guide, 2024 - 2025 Most Beautiful Restaurants - Condé Nast World's 100 Greatest Places - Time MagazineAtmosphere of the Year - World Restaurant Awards",url:"https://www.opentable.com/r/vespertine-culver-city",lat:34.0242037,lng:-118.3817724},
  {name:"Gjelina",cuisine:"American",neighborhood:"Venice",city:"Los Angeles",description:"Gjelina is a restaurant specializing in New American cuisine. Open every day from 9 am until 10:30 pm, serving breakfast, brunch, lunch, and dinner. For breakfast, try 9 grain pancakes with butter and maple syrup or warm banana buckwheat loaf with butter and jam of the day. Brunch options include Moroccan baked eggs and 7 grain porridge.  Gjelina offers a variety of oysters, crudo, charcuterie and salad options to start at lunch and dinner. Main courses include pizzas from our wood fired oven and entrees like duck confit, house made pastas and roasted organic half chicken.*Only ADA certified animals are allowed in Gjelina*20% service charge will be added to parties 6 and more",url:"https://www.opentable.com/gjelina",lat:33.9905045,lng:-118.4649582},
  {name:"Anajak Thai Cuisine",cuisine:"Thai",neighborhood:"Sherman Oaks",city:"Los Angeles",description:"Anajak is a 44 year-old neighborhood bistro serving up Thai specialties with a notable wine list. James Beard Award Winning Chef, Justin Pichetrungsi, pays homage to his father with his traditional recipes through a vibrant à la carte service and a convivial Thai Taco Tuesday (TTT).For assistance, our reservation team is available Tuesday–Sunday, 11am–7pm at 818-501-4201 or by email at res@anajakthai.com. Follow along for the latest updates at @anajakthaifood and anajakthai.com.",url:"https://www.opentable.com/r/anajak-thai-cuisine-sherman-oaks",lat:34.1508718,lng:-118.448986},
  {name:"Harriet's",cuisine:"Cocktail Bar",neighborhood:"West Hollywood",city:"Los Angeles",description:"Harriet's, located on the rooftop of the 1 Hotel, preserves the values of an old-fashioned cocktail lounge with jaw-dropping, panoramic views of Los Angeles. Revelry with a view, our bar is stocked with fresh and seasonal ingredients alongside some of the finest and approachable spirits.   With a curated cocktail menu, lounging daytime drinks turn into evenings and evenings into late nights.  Entrance located on the lobby level with dedicated elevator up to the 9th floor of the West Tower.  Please note that reservations may only be made online. If there is no availability online, we regret that there is no availability for that date and time.",url:"https://www.opentable.com/r/harriets-west-hollywood",lat:34.0923014,lng:-118.3692894},
  {name:"Amiga Amore",cuisine:"Mexican",neighborhood:"Highland Park",city:"Los Angeles",description:"## Amiga Amore: A Culinary Fusion of Italy and Mexico in Los Angeles  Nestled in the heart of Los Angeles, Amiga Amore is a unique restaurant that seamlessly blends the vibrant flavors of Italy and Mexico. Founded by a husband-and-wife team, Alessandro Zecca and Danielle Duran Zecca, this culinary gem offers an unforgettable dining experience that transcends traditional boundaries.  The restaurant's cozy and intimate atmosphere sets the stage for a delightful culinary journey. The exposed brick walls and warm lighting create a welcoming ambiance, while the open kitchen allows guests to witness the artistry of the chefs firsthand.  Amiga Amore's menu is a testament to the couple's passion for both Italian and Mexican cuisine. Each dish is meticulously crafted with fresh, seasonal ingredients, showcasing the harmonious marriage of these two distinct culinary traditions.  Start your meal with the \"noprese\" salad, a refreshing combination of nopales, hibiscus salt, and house-made stracciatella. For a heartier option, try the elote agnolotti, plump corn-filled pasta bursting with flavor. The pork chop milanese, encrusted with crushed tortillas and served with a cilantro-laced arugula salad, is a must-try for meat lovers.  No meal at Amiga",url:"https://www.opentable.com/r/amiga-amore-los-angeles",lat:34.1099469,lng:-118.1969828},
  {name:"Xuntos",cuisine:"Tapas / Small Plates",neighborhood:"Santa Monica",city:"Los Angeles",description:"XUNTOS, \"together\" in Gallego, is a Tapas Bar from Chef Sandra Cordero in the heart of Downtown Santa Monica, serving small plates of things we want you to try: from the farmer's market around the corner to traditional dishes of Galicia, Asturias, Catalunya & the Basque Country, as they're eaten in Spain.The wines follow the food: natural, fun & unrefined–joined at the bar with Spanish twists on classic cocktails, plus vermouths, sherries & cold cervezas.Now open for lunch!! Tuesday-Saturday, 12-5pm.Walk in to the bar for Bikini Bar Happy Hour from 3-6pm, Tuesday-Saturday!Please email us for large parties & private dining: hola@barxuntos.comValidated parking is available across the street at 501 Santa Monica Blvd (Enter on 5th St.): $7 for 3 hours.",url:"https://www.opentable.com/r/xuntos-santa-monica",lat:34.0194704,lng:-118.491227},
  {name:"Petit Trois Le Valley",cuisine:"French",neighborhood:"Sherman Oaks",city:"Los Angeles",description:"Petit Trois Le Valley, the second outpost of Chef Ludo Lefebvre's beloved bistro, opened its doors in 2018 in Sherman Oaks. This larger location channels a lavish French Brasserie, with its marble bar, banquette lined dining room, and a Chef’s counter overlooking the open kitchen. The second dining room can be reserved for larger parties and private events. Since opening, Petit Trois has garnered praise from casual foodies and revered food critics. In 2015, Petit Trois was nominated for Best New Restaurant by the James Beard Foundation and in 2019 earned the Bib Gourmand designation upon the Michelin Guide’s return to Los Angeles. Additionally, Petit Trois was featured on the late Jonathan Gold’s 101 Best Restaurants in Los Angeles list from 2015-2017 and has remained on the list since 2019 when Bill Addison & Patricia Escárcega took over.",url:"https://www.opentable.com/r/petite-trois-le-valley-sherman-oaks",lat:34.1508718,lng:-118.448986},
  {name:"pasjoli",cuisine:"French",neighborhood:"Santa Monica",city:"Los Angeles",description:"Pasjoli is an neighborhood French bistro from James Beard award-winning chef Dave Beran. Inspired by classic & modern French cuisine as well as produce from the farmers' market, pasjoli showcases creative touches on bistro fare.  French is fun!Each evening, we have limited availability of tableside pressed duck dinners. Tableside pressed duck is available by reservation only and will require a deposit.  Please email info@pasjoli.com with any questions. Unfortunately, we cannot accommodate vegan diets.",url:"https://www.opentable.com/r/pasjoli-santa-monica",lat:34.0002326,lng:-118.4820211},
  {name:"Melisse",cuisine:"Californian",neighborhood:"Santa Monica",city:"Los Angeles",description:"Chef & Owner Josiah Citrin has revived his Michelin 2-Star institution with an intimate, 14-seat restaurant with Chef/Partner Ken Takayama. In a setting that blurs the line between kitchen and dining room, Chefs and service staff guide guests through a 2.5-hour culinary experience.Collaborating with California farmers from San Diego to Napa Valley, Chef Josiah sources the most unique and exclusive ingredients available. An 8-course tasting menu is bookended by canapés, amuse-bouches and mignardise, all of which showcase global flavors using both modern and classic techniques.",url:"https://www.opentable.com/melisse",lat:34.0245176,lng:-118.4913669},
  {name:"Phoenix Palace",cuisine:"Chinese",neighborhood:"Chinatown",city:"New York City",description:"The team behind Potluck Club opens Phoenix Palace, a sister restaurant, in the heart of Chinatown. The menu continues to celebrate Cantonese cuisine while drawing inspiration from their childhood favorites.",url:"https://www.opentable.com/r/phoenix-palace-new-york",lat:40.7164913,lng:-73.9962504},
  {name:"l'abeille",cuisine:"French",neighborhood:"TriBeCa",city:"New York City",description:"Nestled on a charming Tribeca cobblestone street corner, l’abeille is an intimate sanctuary where French culinary artistry meets Japanese finesse. With only 48 seats, this hidden gem captivates diners with its seasonal Chef’s Tasting Menu, meticulously crafted by the visionary Chef Mitsunobu Nagae. Drawing on his rich experience from Michelin-starred establishments in Tokyo, Paris, and New York, including a recent tenure as Chef de Cuisine at Shun in Midtown Manhattan, Chef Mitsu curates a symphony of flavors that transcend borders.At l’abeille, guests experience a harmonious blend of French sophistication and Japanese precision. Complementing the exquisite tasting menu is a rotating selection of seasonal a-la-carte dishes, thoughtfully paired with selections from the wine cellar and a captivating cocktail program. Immerse yourself in an unparalleled dining experience at l’abeille, where each dish tells a story and every moment is a celebration of culinary excellence.",url:"https://www.opentable.com/r/labeille-new-york",lat:40.7153802,lng:-74.0093063},
  {name:"Sunn's",cuisine:"Korean",neighborhood:"Chinatown",city:"New York City",description:"Sunn’s is a cozy place for banchan and wine in Chinatown. Chef-owner Sunny Lee offers a selection of banchan alongside a rotating menu meant to be shared. Soju, makgeolli and ice cold Korean lagers can be enjoyed alongside the thoughtful wine list overseen by Parcelle.",url:"https://www.opentable.com/r/sunns-new-york",lat:40.7164913,lng:-73.9962504},
  {name:"Potluck Club",cuisine:"Chinese",neighborhood:"Chinatown",city:"New York City",description:"Potluck Club is a Cantonese-American restaurant founded by childhood friends who grew up in Chinatown with a mission of preserving the neighborhood's cultural heritage.Reservations are recommended, walk-ins are welcomedWe have a 10 minute grace period for all reservations.  If we are able to accommodate you in the event that you arrive beyond the grace period, we will happily do so, however this is at the discretion of the host. If you are running late, please reply to your confirmation text to let us knowTo ensure a smooth dining experience for all our guests, we kindly ask for your understanding regarding our table usage time limits.  Please review and agree to the following guidelines before your visit1-2 guests: 75 mins3-5 guests: 90 mins6+ guests: 2 hoursParties 8+, please e-mail us events@potluckclubny.com to book your Prix Fixe menu reservationCancellation fee of $10 per guest will be applied for any cancellations within 24 hours of the reservation time, & no show",url:"https://www.opentable.com/r/potluck-club-new-york",lat:40.7164913,lng:-73.9962504},
  {name:"Don Angie",cuisine:"Italian",neighborhood:"West Village",city:"New York City",description:"Don Angie is an intimate restaurant serving up a modern ode to Italian-American cuisine by husband and wife chefs and co-owners Angela Rito and Scott Tacinelli, in partnership with Quality Branded. Located in the heart of New York City’s West Village, the restaurant’s menu reimagines comforting dishes from Angie and Scott’s childhoods, with distinctive twists, often drawing inspiration from their collective travels.  Shortly after opening, Don Angie earned a 2-star critic’s pick review from the New York Times and named one of Esquire’s Best New Restaurants in America in 2018. Scott and Angie earned nominations from the James Beard Foundation in 2019, 2020 2022, and 2025. In May 2021, Don Angie was awarded a Michelin star.",url:"https://www.opentable.com/r/don-angie-new-york",lat:40.7341857,lng:-74.00558},
  {name:"Altro Paradiso",cuisine:"Italian",neighborhood:"SoHo",city:"New York City",description:"From globally acclaimed chef Ignacio Mattos, Altro Paradiso is an Italian restaurant in the heart of SoHo and an essential New York City dining destination. The restaurant’s menu draws inspiration from several Italian regions, celebrating timeless craftsmanship throughout, while the room’s high ceilings and glimmering brass bar contribute to a lively nightly atmosphere. Since opening in 2016, Altro has garnered many devoted regulars, ranging from neighborhood residents to travelers who treat the restaurant like a second home whenever they’re in town.",url:"https://www.opentable.com/r/altro-paradiso",lat:40.72288,lng:-73.9987505},
  {name:"Estela",cuisine:"Contemporary American",neighborhood:"NoHo",city:"New York City",description:"One of the most celebrated restaurants in the United States, Estela is an intimate downtown bistro from chef Ignacio Mattos that can be experienced in many ways, whether it’s a thrilling dinner in the dining room, a leisurely weekend brunch with friends, or a late-night drink at the bustling bar. Since opening in 2013, the restaurant has served several signature dishes that are now considered New York City classics, while always offering guests something new to try. Estela holds one Michelin star, among many other major accolades.",url:"https://www.opentable.com/r/estela",lat:40.7246217,lng:-73.9947736},
  {name:"Muku",cuisine:"Japanese",neighborhood:"TriBeCa",city:"New York City",description:"Muku (“無垢”), meaning “purity” or “innocence,” is a Japanese restaurant in New York City led by award-winning Chef Manabu Asanuma, whose experience spans acclaimed kitchens in New York, Japan, and Taiwan. Rooted in seasonality, simplicity, and intention, Muku draws inspiration from kaiseki while celebrating \"goho\" - the five classical techniques of Japanese cooking: raw, grilled, simmered, steamed, and fried. Each dish is crafted with restraint, using only what enhances the true character of the ingredients, resulting in a focused, expressive cuisine that honors tradition while offering a refined, modern Japanese dining experience.Guests are welcome to bring bottles not featured on our beverage list to enjoy with our menu. Corkage is $175 per 720ml sake bottle or 750ml wine bottle, with a limit of two bottle per reservation. Please email us at info@restaurantmuku.nyc to confirm whether we carry a label.",url:"https://www.opentable.com/r/muku-new-york",lat:40.7153802,lng:-74.0093063},
  {name:"San Sabino",cuisine:"Italian",neighborhood:"West Village",city:"New York City",description:"San Sabino is a seafood focused restaurant from wife and husband team, chefs Angie Rito and Scott Tacinelli, in partnership with Quality Branded. After working in some of NYC’s top Italian restaurants and dreaming of opening their own special neighborhood spot, Angie and Scott opened Don Angie in 2018 to tremendous critical acclaim. They quickly became known for boldly unexpected dishes that challenge your perception of traditional Italian-American cooking.Six years later and just a few doors down from Don Angie, they've now opened their second restaurant, San Sabino. Named after Scott’s grandfather (from Sanza, Italy, where most people are named after the patron saint Sabino), San Sabino offers a playful spin on Italian dishes from Shrimp Parm to Pasta Alle Vongole, with bold twists influenced by coastal American cities where many Italians settled, from New Orleans to the Jersey Shore.",url:"https://www.opentable.com/r/san-sabino-new-york",lat:40.7341857,lng:-74.00558},
  {name:"Kabawa",cuisine:"Caribbean",neighborhood:"East Village",city:"New York City",description:"Kabawa, a deeply personal restaurant from Chef Paul Carmichael and Momofuku, offers a nuanced and distinct perspective on Caribbean cuisine. Built around a set menu with plenty of choices, it’s a place to take your time, enjoy a meal, and discover something new each time you visit.Kabawa’s menu is a three-course, $145 prix fixe experience, exclusive of beverage, tax, and gratuity.  The restaurant is divided between kitchen counter seating, an immersive experience with direct chef service, or more secluded table seating.Structured to showcase the depth and diversity of Caribbean cuisine, our ingredients are thoughtfully procured, fusing local produce from neighborhoods right here in New York with specialty items sourced directly from the Caribbean. Every touch point — from the custom mosaics to the ingredient sourcing to the instrumental music — is intentional, tapping into Chef Paul’s upbringing in Barbados to reflect the vibrant, welcoming spirit of a Caribbean home.",url:"https://www.opentable.com/r/kabawa-new-york",lat:40.7292688,lng:-73.9873613},
  {name:"Tolo",cuisine:"Chinese",neighborhood:"Lower East Side",city:"New York City",description:"Tolo is a restaurant by Ron Yan, a Chinese chef that has spent the past decade working in NYC’s culinary scene. Tolo’s menu features a range of dishes from raw seafood to rice and noodles to sweet & sour crispy fish amidst vintage furniture and the backdrop of the open kitchen. The wide-ranging wine list with over 300 selections is curated by Parcelle. It spotlights natural producers as well as a deep bench of traditional collectibles.The contact phone number is TEXT ONLY. All large parties of 7 - 16 people are subject to the prix-fixe menu.",url:"https://www.opentable.com/r/tolo-new-york",lat:40.7159357,lng:-73.9868057},
  {name:"Gjelina - New York",cuisine:"Italian",neighborhood:"East Village",city:"New York City",description:"Gjelina is a neighborhood restaurant that serves locally-sourced produce,  hand-made pizzas, pastas, steaks and raw bar. We utilize wood fire cookery for much of the menu, highlighting what makes each ingredient special. Our 2 bars serve market driven cocktails, paying homage to the classics. Natural and classic wines flow, with something for all tastes. Gjelina is a great backdrop for any occasion- date night out, a single seat at the bar for a pizza or a formal celebration.  Brunch service is fun and thoughtful with dishes like our 9 grain pancakes, baked eggs and huevos rancheros. For event inquiries, please email us!",url:"https://www.opentable.com/r/gjelina-new-york",lat:40.7292688,lng:-73.9873613},
  {name:"Fairfax",cuisine:"American",neighborhood:"Greenwich Village",city:"New York City",description:"Birds, Burgers and Booze. \"We've Got it All\"Fairfax is an all-day neighborhood restaurant. Come through and hang!",url:"https://www.opentable.com/r/fairfax-new-york",lat:40.7335844,lng:-74.0028172},
  {name:"Parcelle Chinatown",cuisine:"Bar / Lounge / Bottle Service",neighborhood:"Chinatown",city:"New York City",description:"Parcelle Chinatown, located at 135 Division Street, is a great spot for dinner or a casual wine-and-snack hangout, and if you're feeling spontaneous, there's always room for walk-ins.The upstairs main room features vintage furniture and cozy seating. Known for their robust wine list that highlights both classics and unique finds.Downstairs, you'll find their Studio Room, an intimate venue used for private events. When not booked, it transforms into a cocktail bar open to the public Thursday through Saturday.",url:"https://www.opentable.com/r/parcelle-chinatown",lat:40.7164913,lng:-73.9962504},
  {name:"Una Pizza Napoletana",cuisine:"Italian",neighborhood:"Lower East Side",city:"New York City",description:"Reservations open 14 days in advance at 9 AM ET.Chef/Owner Anthony Mangieri has been crafting naturally-leavened, wood-fired pizzas with meticulous attention to detail since 1996. A pioneer of Neapolitan pizza in the U.S., Anthony still makes every ball of dough by hand and is at Una making pizza every night. A few starters and desserts complement the pizzas, along with wines from Campania and Champagne. Everything is made fresh daily until sold out. The choice to have only one location allows for an obsessive focus on every detail.Una has been awarded #1 pizzeria in the world by 50 Top Pizza for 2022, 2024, and 2025, a MICHELIN Bib Gourmand, and recognized in media outlets including the TODAY Show, CBS Mornings, and Esquire. Open Thursday, Friday and Saturday. Reservations from 5:00 - 9:30 for parties of up to four. Reservations that have been traded or purchased through third party platforms will not be honored.",url:"https://www.opentable.com/r/una-pizza-napoletana-new-york",lat:40.7159357,lng:-73.9868057},
  {name:"Jeffrey's Grocery",cuisine:"American",neighborhood:"Greenwich Village",city:"New York City",description:"Of all Gabriel Stulman's spots, Jeffrey's Grocery is the one you go to snack on raw bar offerings and indulge in a buttery, lobster roll. As with all Stulman joints — the vibe is lively, the service is delightfully friendly, and the specials are very worth considering. It's a go-to spot for a casual, fun-filled evening, particularly if you're in the mood for oysters, which they source from dozens of local aqua-farmers.",url:"https://www.opentable.com/r/jeffreys-grocery-new-york",lat:40.7339144,lng:-74.0013412},
  {name:"Joseph Leonard",cuisine:"American",neighborhood:"West Village",city:"New York City",description:"In its bright and airy modern bistro, Joseph Leonard serves modern American fare with a rustic twist. Appetizers include a charcuterie board with meats and cheeses, caramelized cauliflower with mustard vinaigrette and grilled asparagus with shrimp. Popular entr&eacute;e items, such as the roasted chicken with English peas, steamed mussels topped with bacon in a white wine sauce and hen of the woods mushrooms with potato gnocchi, speak to the variety and high-quality ingredients utilized at Joseph Leonard. In addition to typical items like strawberry shortcake and chocolate mousse cake, a gourmet selection of cheeses are on the dessert menu.  Craft beer and specialty cocktails add to the contemporary feel of Joseph Leonard. Try the gentleman caller, with bourbon, peach tea, lemon and honey for a cool and refreshing addition to your meal.",url:"https://www.opentable.com/r/joseph-leonard-new-york",lat:40.7335787,lng:-74.0016703},
  {name:"Red Hook Tavern",cuisine:"American",neighborhood:"Red Hook",city:"New York City",description:"Red Hook Tavern brings classic American tavern fare to the waterfront village in Brooklyn, where friends can share a bottle of wine, a few laughs, and a great meal. We hope from the moment you walk into this beautiful old space it makes you feel as special as it did the first time I walked in, almost five years ago. Cheers, Billy",url:"https://www.opentable.com/r/red-hook-tavern-brooklyn",lat:40.6778746,lng:-74.0120875},
  {name:"Demo",cuisine:"European",neighborhood:"West Village",city:"New York City",description:"Demo is a restaurant in the West Village serving modern, Europe-inspired cuisine from Executive Chef Quang Nguyen and Sous Chef Dina Fan. Inventive seasonal dishes—like wax beans with bottarga and boquerones—share the menu with updated classics like beef tongue tonnato, alongside a carefully curated list of wines by glass and bottle. The sleek interior, tastefully adorned with red marble and dark wood, hosts a front bar for walk-ins as well as a chef's counter in the back.Please note: We are a small restaurant. Reservations in the dining room and at the chef's counter are intended for dinner. For drinks and snacks we accept walk-ins at the front bar. Thank you for your understanding.",url:"https://www.opentable.com/r/demo-new-york",lat:40.7300299,lng:-74.0030254},
  {name:"Scarr's Pizza",cuisine:"Pizzeria",neighborhood:"Chinatown",city:"New York City",description:"First opened in 2016 and located on Orchard Street, where the LES, Chinatown and Dimes Square converge, Scarr's Pizza has been called, \"The best slice in New York.\" With a focus on all-natural and organic ingredients, owner and 2024 James Beard Nominee (Best Chef NY State) Scarr Pimentel has crafted not only the best tasting slice in the city, but the healthiest too. Skip the line, book a table and come in for a pie. There is a full bar and the dine-in menu features the crowd favorite Hotboi and Clark Kent as well as exclusive items like the Calzones.",url:"https://www.opentable.com/r/scarrs-pizza-new-york",lat:40.7164913,lng:-73.9962504},
  {name:"Mitsuru",cuisine:"Japanese",neighborhood:"Greenwich Village",city:"New York City",description:"Mitsuru is a neighborhood Japanese restaurant in the West Village. We offer a range of Japanese fare focused on sushi, hand rolls and heartier entrees alongside a big wine list of 500+ bottles. An omakase can be enjoyed at the 8-seat counter, where chef-owner Mitsuru Tamura presides nightly.",url:"https://www.opentable.com/r/mitsuru-new-york",lat:40.7335844,lng:-74.0028172},
  {name:"SAPPEISAN",cuisine:"Thai",neighborhood:"Greenwich Village",city:"New York City",description:"SAPPE is a trip to explore something unique, authentic and ethereal. Our guest will be indulged and pampered through all their five perceptions; visual, auditory, olfactory, haptic and gustatory. SAPPE is the extraordinary place where people come to rejoice and revel. The train market and street food style are what SAPPE aim to offer. The vibe of bustling ambience of train station, the food stalls that offer street bites ‘ปิ้งย่าง (Ping-Yang)’ which is variety of grilled goodies on bamboo skewers and BBQ, as well as the bold flavor of E-San style cuisine are what SAPPE is looking to introduce.",url:"https://www.opentable.com/r/sappeisan-new-york",lat:40.7335844,lng:-74.0028172},
  {name:"Casa Mono",cuisine:"Spanish",neighborhood:"Union Square",city:"New York City",description:"Casa Mono and its sister restaurant, Bar Jamon, are located next to each other on Irving Place and 17th Street, just east of Union Square. Awarded three stars from The New York Times in 2015 and a Michelin Star in 2009 (and every year since), Casa Mono is a tapas bar restaurant inspired by the cooking of Spain’s Costa Brava.***Keeping our guests and staff safe is our number one priority.We are strictly following CDC, OSHA and NYC Health Department guidelines.***",url:"https://www.opentable.com/r/casa-mono-new-york",lat:40.7359257,lng:-73.9871655},
  {name:"Parcelle Greenwich Village",cuisine:"Wine Bar",neighborhood:"Greenwich Village",city:"New York City",description:"Parcelle Greenwich Village is a restaurant from Parcelle, an online wine retailer and hospitality group, located at 72 MacDougal St. There is seasonal outdoor dining, a spirits list, full dinner menu, and wine list of over 500 selections.",url:"https://www.opentable.com/r/parcelle-greenwich-village-new-york",lat:40.7335844,lng:-74.0028172},
  {name:"Sailor",cuisine:"Bistro",neighborhood:"Fort Greene",city:"New York City",description:"Sailor is a neighborhood bistro celebrating Chef April Bloomfield’s menu of elevated takes on familiar dishes. At the heart of the restaurants is it's deep wine list, which ranges from easy drinkers through classics and more esoteric selections. Tying it all together is the thoughtful service that Happy Cooking Hospitality has become known for.",url:"https://www.opentable.com/r/sailor-brooklyn",lat:40.6893919,lng:-73.9703166},
  {name:"Hawksmoor NYC",cuisine:"American",neighborhood:"Gramercy Park",city:"New York City",description:"Located in the heart of Gramercy in the restored Assembly Hall of the landmarked United Charities Building, Hawksmoor is a steak restaurant that celebrates all-natural, pasture-reared, and traditionally dry-aged beef. Our beef is seasoned simply with sea salt and cooked over live-fire charcoal. Our seafood is locally and sustainably sourced from northeastern waters and we use small-farm produce whenever possible. On Sunday afternoons Hawksmoor keeps with the tried-and-true British tradition and features a Sunday Roast. Completing our offerings are award-winning cocktails, including New York City's coldest martini, and a carefully curated wine selection. The restaurant houses 150 in the dining room and 35 in the bar area. There are also two private dining rooms that can hold 12 people and serve exclusive, family-style menus.",url:"https://www.opentable.com/r/hawksmoor-new-york",lat:40.7379502,lng:-73.9859154},
  {name:"Bar Kabawa",cuisine:"Caribbean",neighborhood:"East Village",city:"New York City",description:"While we do offer reservations each night, we save half the room for walk-ins too. Come on by! | Bar Kabawa is a wine and daiquiri bar from Chef Paul Carmichael and Momofuku celebrating the flavors of the Caribbean in the heart of the East Village. Drawing inspiration from Chef Paul's culinary journey, the menu features daiquiris, wines by the glass, and a compact list of patties and raw bar bites. Bar Kabawa is a place to relax, enjoy, and feel at home—whether you're dropping in for a casual drink or gathering with friends.",url:"https://www.opentable.com/r/bar-kabawa-new-york",lat:40.7292688,lng:-73.9873613},
  {name:"Momofuku Noodle Bar - East Village",cuisine:"Asian",neighborhood:"East Village",city:"New York City",description:"Momofuku Noodle Bar East Village serves a constantly changing roster of noodles, steamed breads, and daily dishes. We offer reservations and also accept walk-ins. Reservations open 14 days in advance at 10 am. Make sure to keep an eye on our website for today's menu. Noodle Bar offers three large format meals:Fried Chicken Meal: Two whole fried chickens (southern-style and Korean-style) served with scallion pancakes, vegetables and sauces. Available for parties of 4 to 6 people at lunch & dinner. Look for \"Fried Chicken\" when reserving. Fried Chicken & Caviar: Two chickens battered and fried whole, served with caviar, chive crepes, potato chips and sauces. Available for parties of 2 to 4 people at 5pm and 8pm. Look for \"Caviar/Chicken\" when reserving. Whole Suckling Pig: Whole suckling pig platter with ssäm fixings, sausage & bean stew, rice and steamed buns. Available for parties of 6 to 8 people at 5pm everyday. Look for \"Suckling Pig\" when reserving.",url:"https://www.opentable.com/r/momofuku-noodle-bar-east-village-new-york-2",lat:40.7291861,lng:-73.9843786},
  {name:"The Golden Swan",cuisine:"French",neighborhood:"West Village",city:"New York City",description:"The Golden Swan is a neighborhood French tavern that occupies a historic West Village townhouse. The concept was inspired by an iconic New York restaurant of the same name that served as a den for artists and thieves in the 1900s. Chef Brixton's menu is rooted in sourcing, ensuring that every single ingredient that is served comes from the best possible place and is of the highest quality. Guests can casually walk into the first floor bar room, known as The Wallace Room, for the acclaimed Brixton Burger or find their way upstairs to The Dining Room for a more elevated experience with dishes served tableside like Dover Sole with Sauce Meuniere and Côte de Boeuf with bordelaise jus as well as signature dishes like Branzino en Papillote and Crescent Duck. No matter where you enjoy your meal, ingredient-forward drinks that harken back to the golden age of cocktails flow endlessly, evoking a sense of revelry that pays tribute to the concept's history.",url:"https://www.opentable.com/r/the-golden-swan-new-york",lat:40.7341857,lng:-74.00558},
  {name:"Razza - Jersey City",cuisine:"Pizzeria",neighborhood:"Jersey City",city:"New York City",description:"Razza is an intimate pizzeria  in Jersey City, NJ centered around wood-fired pizzas made with locally sourced ingredients. Chef and owner Dan Richer, a six-time James Beard Award–nominated chef, is known for challenging conventional pizza-making practices with the goal of elevating the craft of pizza in America. The restaurant offers seasonally driven small plates, housemade bread and butter and a thoughtfully curated bar program. The only pizzeria to receive a three-star review from The New York Times, Razza was named Best Pizza in North America by 50 Top Pizza in 2019. The restaurant and Chef Dan Richer have been featured on Somebody Feed Phil, CBS Saturday morning and CNN’s Breaking Bread. Reservations are available 28 days in advance at noon.",url:"https://www.opentable.com/r/razza-jersey-city",lat:40.7162876,lng:-74.0369162},
  {name:"Blu on the Hudson",cuisine:"Contemporary American",neighborhood:"Weehawken",city:"New York City",description:"Blu On The Hudson, perched on the Weehawken waterfront, is repeatedly hailed by guests as one of the most spectacular dining experiences in the New York & New Jersey area. Its soaring floor-to-ceiling windows frame uninterrupted, million-dollar views of the Manhattan skyline that many reviewers swear beat anything in the city itself—sunsets and city lights reflecting on the Hudson create pure magic. The sleek, modern 16,000-square-foot space feels upscale yet warm, with a lively bar, live DJ on weekends, and service that’s attentive without being stuffy. Food lovers rave about the inventive contemporary American menu: perfectly cooked steaks, handmade pastas, chilled seafood towers, and truly outstanding sushi. with the freshest options. Cocktails arrive as a mini show—smoke, fire, glowing orbs. Guests call it “romantic perfection,” “a hidden gem,” and “worth every penny and the ferry ride across the river”—an elegant, delicious escape that leaves everyone enchanted.",url:"https://www.opentable.com/r/blu-on-the-hudson-weehawken",lat:40.7328323,lng:-74.0098346},
  {name:"Moody Tongue Sushi",cuisine:"Sushi",neighborhood:"West Village",city:"New York City",description:"Moody Tongue Sushi is MICHELIN starred Moody Tongue Brewery's West Village restaurant focused on sushi and beer. The restaurant presents a hyper-seasonal, elevated sushi menu from Executive Sushi Chef Hiromi Iwakiri alongside curated beer pairings from Moody Tongue Brewery's acclaimed Brewmaster Jared Rouben. The beer menu showcases a rotating selection of 16 seasonal beers, including offerings like the New York exclusive Shaved Black Truffle Rice Lager, specialty beers such as the Pressed Asian Pear Saison (which is served in a flute and highlights notes reminiscent of vintage Champagne), and perennial favorites like the Juiced Lychee IPA, Orange Blossom Belgian Blonde and Yuzu Ale. The sushi menu additionally includes a selection of vegetarian and vegan offerings, and the beverage program includes a curated list of wines and cocktails. For parties with 7+ guests, please e-mail newyork@moodytongue.com for reservation inquiries or information regarding Private Events.",url:"https://www.opentable.com/r/moody-tongue-sushi-new-york",lat:40.7341857,lng:-74.00558},
  {name:"Bar Miller",cuisine:"Sushi",neighborhood:"East Village",city:"New York City",description:"Nestled in an intimate space in the East Village, Bar Miller is the showcase omakase restaurant from the sushi concept Rosella. Just a few blocks away, our 8-seat sushi bar is seated twice nightly for a tasting menu that features local, sustainably-sourced ingredients.Domestic beer, wine, and cider shape a drink program that stays true to our approach to the menu, while the sake list highlights Brooklyn-based breweries and less conventional styles from Japan.Bar Miller happily accommodates solo diners. Please email info@barmiller with your reservation request and we will follow up!",url:"https://www.opentable.com/r/bar-miller-new-york",lat:40.7292688,lng:-73.9873613},
  {name:"The Tavern at Gramercy Tavern",cuisine:"Market Cuisine",neighborhood:"Gramercy Park",city:"New York City",description:"Revered as one of the country’s great American restaurants, Gramercy Tavern has welcomed guests for over three decades with contemporary seasonal cuisine, warm hospitality, and thoughtful service. Rooted in the rhythms of the harvest and shaped by enduring relationships with local farms and the nearby Union Square Greenmarket, Chef Michael Anthony’s ever-evolving menus unfold across two distinct experiences. The Tavern offers wood-fired, seasonal dishes served à la carte in a lively setting.",url:"https://www.opentable.com/r/the-tavern-at-gramercy-tavern-new-york",lat:40.7379502,lng:-73.9859154},
  {name:"Le B.",cuisine:"European",neighborhood:"West Village",city:"New York City",description:"Experience luxurious, modern Continental cuisine at Restaurant Le B., a vibrant fine-dining destination rooted in the rich culinary culture of Downtown Manhattan. Helmed by the acclaimed Chef Angie Mar, our menu revives forgotten indulgences from land, air, and sea, blending history with bold, tableside presentations and signature extravagance. A multi-award-winning restaurant, Restaurant Le B. has earned Four Stars from Forbes, Best New Restaurant accolades from Conde Nast Traveler, Financial Times, and Robb Report, and was named one of Esquire Magazine’s 50 Best Restaurants in America. With an atmosphere inspired by Chef Mar’s legendary Beatrice Inn, our dining experience is both sophisticated and playfully indulgent. *PLEASE NOTE: Le Burger is only available on a pre-order basis, with a limited amount of bookings nightly. In order to experience Le Burger, you must book using the Le Burger Reserve link in our profile, or partake in our Seasonal Tasting Menu.",url:"https://www.opentable.com/r/le-b-new-york",lat:40.7341857,lng:-74.00558},
  {name:"Strange Delight",cuisine:"Oyster Bar",neighborhood:"Fort Greene",city:"New York City",description:"A contemporary take on the classic oyster bar, located in Fort Greene, Brooklyn, near BAM, Barclay's, the Paramount, and Atlantic Terminal.  Strange Delight finds its influence in New Orleans and is also inspired by the rich history of oysters in New York. Our menu consists of regional seafood prepared in a variety of styles: Charbroiled Oysters and Shrimp Remoulade share the stage with classic seafood towers and Oysters Rockefeller. A rotating selection of larger plates features items such as Black Cod Almondine and Blackened Swordfish Belly.To drink, Strange Delight updates old classics, serving both a Hurricane and Ramos Gin Fizz service for 2, alongside Martinis and Sazeracs. Our wine and beer lists feature our favorite American producers.  Please note: We offer 3 distinct types of reservations:Regular: a table in our back dining roomBar: seats at our back dining room barHigh-top: a higher table with bar stools in our front room with an open kitchen and oyster counter.",url:"https://www.opentable.com/r/strange-delight-brooklyn",lat:40.6872052,lng:-73.9759848},
  {name:"ASKA",cuisine:"Nordic",neighborhood:"Williamsburg",city:"New York City",description:"Chef Fredrik Berselius brings his love of nature to his urban surroundings through food at Brooklyn's only two Michelin-starred restaurant. With an emphasis on ingredients from the Northeastern region and influenced by his Scandinavian homeland, Aska, Swedish for \"ashes,\" offers a distinctive dining experience through a procession of courses prepared from an open kitchen and served to guests of only ten tables each night.",url:"https://www.opentable.com/r/aska-brooklyn",lat:40.714622,lng:-73.95345},
  {name:"The Dining Room at Gramercy Tavern",cuisine:"Contemporary American",neighborhood:"Union Square",city:"New York City",description:"Revered as one of the country’s great American restaurants, Gramercy Tavern has welcomed guests for over three decades with contemporary seasonal cuisine, warm hospitality, and thoughtful service. Rooted in the rhythms of the harvest and shaped by enduring relationships with local farms and the nearby Union Square Greenmarket, Chef Michael Anthony’s ever-evolving menus unfold across two distinct experiences. In the Dining Room, a warm and welcoming setting frames a more refined expression of our seasonal menu. At lunch, guests may choose between a three-course prix fixe or à la carte. At dinner, the menu is centered around a five-course, prix fixe seasonal experience.",url:"https://www.opentable.com/r/gramercy-tavern-new-york",lat:40.7360717,lng:-73.9901888},
