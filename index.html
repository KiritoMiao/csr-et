  {name:"Maddy Rose at Liberty House",cuisine:"Contemporary American",neighborhood:"Jersey City",city:"New York City",description:"Where bold flavors meet unbeatable waterfront city views. Whether you’re diving into our perfectly seared steaks, ultra-fresh seafood, or signature craft cocktails, every bite (and sip) is a vibe. We offer a menu that speaks to every palate.You may remember us as Liberty House, and rest assured, we are still the same mouthwatering food and cocktails, unmatched level of hospitality, and unbeatable skyline waterfront views, we just decided to rename the restaurant after our daughter, Maddy Rose.Located on the Jersey City waterfront, Maddy Rose Restaurant offers a dining experience like no other. With panoramic views of the New York City skyline, indulge in expertly prepared steaks, fresh seafood, and elevated yet approachable cuisine that brings bold flavors to every plate. Whether you're joining us for a romantic dinner, a lively night out, or cocktails by the water, our restaurant is designed to impress.",url:"https://www.opentable.com/r/maddy-rose-at-liberty-house-jersey-city",lat:40.7162876,lng:-74.0369162},
  {name:"Brass",cuisine:"European",neighborhood:"Midtown",city:"New York City",description:"A New York City Brasserie. Taking inspiration from the style of French brasseries but without adhering to their playbook, BRASS restaurant showcases a playful contemporary spirit while remaining true to the cuisine’s unwavering appeal.",url:"https://www.opentable.com/r/brass-bar-new-york",lat:40.7551169,lng:-73.98478},
  {name:"Momofuku Noodle Bar - Uptown",cuisine:"Asian",neighborhood:"Midtown",city:"New York City",description:"At this second location, David Chang rethinks his iconic noodle shop. The Columbus Circle Noodle Bar serves a constantly changing roster of noodles, steamed breads made in-house, soft serve, and daily dishes, in a sleek wood-accented space. Bar-wise, there’s a full selection of beer, wine, sake, and cocktails, with a focus on highballs. Stop by for a quick bite at the kitchen counter, or book the private dining room for a celebratory event.Noodle Bar Uptown accepts reservations 30 days in advance starting at 10 am. Although making a reservation is recommended, walk-ins are welcome and can be accommodated at the bar or at tables if space permits.For parties larger than 9 guests, please visit the Private Events page on our website.",url:"https://www.opentable.com/r/momofuku-noodle-bar-new-york",lat:40.7551169,lng:-73.98478},
  {name:"Di An Di",cuisine:"Vietnamese",neighborhood:"Greenpoint",city:"New York City",description:"Named for an endearing Vietnamese phrase shared between friends and family, Di An Di translates to “let’s go eat” and specializes in modern Vietnamese fare. Owned and operated by first-generation Vietnamese-Americans, the cuisine is rooted in tradition with a focus on innovation, led by Executive Chef Caroline Hahm. The restaurant's signature dish, Pho Thin Hanoi, is a northern-style pho that captures the essence of Vietnamese flavors. Di An Di has been recognized by the Michelin guide and is located near Transmitter Park in Greenpoint. The atmosphere is airy and verdant, enhanced by beautiful skylights that create an inviting dining experience.",url:"https://www.opentable.com/r/di-an-di-brooklyn",lat:40.7295921,lng:-73.9582524},
  {name:"Ci Siamo",cuisine:"Italian",neighborhood:"Chelsea",city:"New York City",description:"Ci Siamo translates to \"here we are\" or \"we've finally arrived.\" It's the clinking of glasses after a long week, the rush of arriving at a new destination, the relief of a familiar smile — it's an exhalation. Celebrating the beauty of simplicity, Chef Hillary Sterling centers her Italian-inflected menu around live-fire cooking and seasonal ingredients, bridging the traditional with the contemporary in a transportive yet familiar space.",url:"https://www.opentable.com/r/ci-siamo-new-york",lat:40.7464906,lng:-74.0015283},
  {name:"odo",cuisine:"Japanese",neighborhood:"Flatiron District",city:"New York City",description:"odo is open for lunch and dinner service from Wednesday through Sunday.The Lounge is open from Tuesday through SaturdayPlease note that reservations at the lounge do not offer our Kaiseki Tasting Experience.odo offers a 20 minute grace period.   Please contact us via email if you are running late.For the consideration of our other guests, children younger than 10 are not allowed at the Chef's Counter.  Please note that all guests seated at the Chef's Counter must partake in the tasting course.While we do our best to accommodate most allergies and dietary restrictions, we cannot accommodate vegan, vegetarian, wheat and gluten-free guests.  We are also unable to accommodate guests who cannot consume seafood or seaweed.Please contact us directly at odo.reservation@gmail.com to ensure we can accommodate your needs.Cancellations can be refunded up to 48 hours from the reservation.  Any cancellations made within 48 hours, as well as no shows will not be refunded.",url:"https://www.opentable.com/r/odo-new-york",lat:40.7410722,lng:-73.9896534},
  {name:"Felina Steak- Jersey City",cuisine:"Italian",neighborhood:"Jersey City",city:"New York City",description:"Located directly on the Hudson River, Felina Steak is a sleek, modern shrine to Italian-inspired steaks, chops, and seafood. The entrance showcases a dry-aging room with prime cuts and a two-tiered live lobster tank. Inside, an open kitchen adds energy to the intimate dining room, where guests enjoy views of the Manhattan skyline and the Statue of Liberty while watching the culinary team work with focus and precision. The menu is globally inspired yet rooted in bold, flavor-driven dishes that highlight high-quality ingredients and thoughtful techniques. Guests can sip expertly crafted cocktails at our bar, Nove, or explore our curated wine list with help from our sommelier. Whether you're here for a night out or a special occasion, Felina Steak delivers a unique and elevated experience. Outdoor dining is now available on a first come, first served basis, weather permitting. Be sure to visit the Stork Club Rooftop after dinner for more cocktails and breathtaking views.",url:"https://www.opentable.com/r/felina-steak-at-hudson-house-jersey-city",lat:40.7162876,lng:-74.0369162},
  {name:"The Modern",cuisine:"Contemporary American",neighborhood:"Midtown",city:"New York City",description:"The Modern is a two Michelin-starred contemporary American restaurant located within the MoMA, overlooking the Abby Aldrich Rockefeller Sculpture Garden. The Modern’s seasonal tasting menus, curated by Executive Chef Thomas Allan, are complemented by an award-winning bar and wine program.Part of Danny Meyer’s Union Square Hospitality Group and a member of Relais & Châteaux.",url:"https://www.opentable.com/r/the-modern-dining-room",lat:40.7610807,lng:-73.9770877},
  {name:"The Bar Room at The Modern",cuisine:"Contemporary American",neighborhood:"Midtown East",city:"New York City",description:"Our full availability can be seen at themodernnyc.comLocated adjacent to The Museum of Modern Art, The Bar Room at The Modern offers Chef Thomas Allan's vividly seasonal contemporary, à la carte cooking, along with an award-winning wine program and carefully curated cocktails, beer, and spirits. Guests have the option of sitting in The Bar Room, the adjacent lounge, or at the vibrant 20-seat marble bar. Walk-ins are accepted in all three areas, and The Bar Room at The Modern welcomes reservations up to 28 days in advance.",url:"https://www.opentable.com/r/the-bar-room-at-the-modern-new-york",lat:40.7598219,lng:-73.9724708},
  {name:"Drift Restaurant & Bar",cuisine:"Contemporary American",neighborhood:"Weehawken",city:"New York City",description:"Drift Restaurant in Weehawken, NJ serves as a blend of modern flair and coastal charm.  It is elegantly perched on the waterfront, offering breathtaking panoramic views of the Manhattan skyline.  Drift's interior is sleek yet cozy, adorned with a nautical-themed de for that evokes a serene oceanic atmosphere.  The menu is a delightful journey through contemporary American cuisine.",url:"https://www.opentable.com/r/drift-restaurant-and-bar-weehawken",lat:40.7328323,lng:-74.0098346},
  {name:"Pig and Khao - UWS",cuisine:"Southeast Asian",neighborhood:"Upper West Side",city:"New York City",description:"The exciting follow-up to LES favorite Pig & Khao from Chef Leah Cohen (Top Chef Alum, judge on Beat Bobby Flay). Whether you're going to the Museum of Natural History, a show at the Beacon Theater, or looking for a new neighborhood spot, we've got you covered! Our Southeast Asian menu is full of flavor and fun. Come in for our famous Sizzling Sisig and Coconut Rice or try our new roti tacos! We're open 7 days a week and serve brunch on Saturday and Sunday. If it's nice outside, we're outside - check out our sidewalk patio.Summer Days - join us starting at 12:00 pm on Thursdays and Fridays for summer specialsHappy Hour Mon-Wed - 4pm to 6pm!Kids Specials during Happy Hour!",url:"https://www.opentable.com/r/pig-and-khao-uws-new-york",lat:40.7870455,lng:-73.9754163},
  {name:"Popoca",cuisine:"Latin American",neighborhood:"Oakland",city:"San Francisco",description:"Popoca is a Salvadoran-inspired restaurant in the heart of Oakland. Popoca means “to emit smoke” in Nawat, the language of native people of El Salvador who stoked wood fires to prepare food over a comal for their families. Revered as more than just a means of cooking, smoke represents a prayer or offering to the spirits.Popoca is a mix of heritage and play. Our food is driven by preserving past, creating something new and uniquely Oakland. After years of pop-ups, Popoca has its own digs in the Old Oakland neighborhood, where the pupusas, chicken with fermented pineapple sauce, and other Cali-Salvadoran specialties are happily devoured.",url:"https://www.opentable.com/r/popoca-oakland",lat:37.7993876,lng:-122.3765763},
  {name:"Burdell",cuisine:"Soul food",neighborhood:"Oakland",city:"San Francisco",description:"Burdell is a Soul Food restaurant in the Temescal neighborhood of Oakland from James Beard Finalist, Chef Geoff Davis.Named for and inspired by his maternal grandmother, Burdell, the restaurant reflects her love for well-set tables, entertaining guests, shared meals, and laughter.  Burdell is centered on nostalgia, family recipes, thoughtful and sustainable sourcing, and the forgotten impact of Black farming, ranching, fishing, foraging, and culture on American cuisine and hospitality. The menu highlights farmers and artisans harvesting and creating excellent products around us. Paired with the food is a robust list of wine and beverages from producers around the World-focusing on wines that are farmed and crafted with care and sustainable practices.",url:"https://www.opentable.com/r/burdell-oakland",lat:37.7993876,lng:-122.3765763},
  {name:"Che Fico San Francisco",cuisine:"Italian",neighborhood:"North Panhandle / USF",city:"San Francisco",description:"Che Fico, is a California Italian restaurant from Chefs David Nayfeld and Matt Brewer in San Francisco's NOPA neighborhood.  The food focuses on Italian cuisine through the lens of California. It’s our vision of Northern California as if it is a region in Italy, our connection to the region, and our love for Italian culinary practices. The rustic, market-driven menu features handmade pasta, pizzas, antipasti, housemade salumi, meat, and fish plus dishes from the Jewish-Roman heritage known as “Cucina Ebraica.” We also offer a tasty Brunch on Saturdays and Sundays. The beverage program focuses heavily on both Italian and Californian wines with a cocktail program that utilizes a variety of spirits, amaros, and seasonal ingredients. Che Fico is a place to gather with friends, family or a date night and enjoy warm hospitality, food, and drink, through an approachable menu and convivial ambiance.",url:"https://www.opentable.com/r/che-fico-san-francisco",lat:37.7735,lng:-122.437},
  {name:"The Progress",cuisine:"Contemporary American",neighborhood:"Western Addition",city:"San Francisco",description:"The Progress is a vehicle for a completely local production. Innovative meals are served with memorable wine & cocktails. The Greatest Dinner Party Ever.",url:"https://www.opentable.com/r/the-progress-san-francisco-1",lat:37.779559,lng:-122.42981},
  {name:"State Bird Provisions",cuisine:"Californian",neighborhood:"Western Addition",city:"San Francisco",description:"State Bird Provisions started as a recipe for serving quail, it has slowly evolved into a restaurant without any programmed elements.",url:"https://www.opentable.com/r/state-bird-provisions-san-francisco",lat:37.7837055,lng:-122.4329482},
  {name:"Niku Steakhouse",cuisine:"Steakhouse",neighborhood:"SOMA",city:"San Francisco",description:"Located in San Francisco’s Design District, Niku Steakhouse is a meat-focused restaurant, highlighting an in-house dry aging program, exclusive cuts of coveted Japanese A5 wagyu with an emphasis on wood fired cooking. Niku, by the Omakase Restaurant Group, hosts a dining room oriented around a roaring custom binchotan charcoal and wood-fired grill, where guests watch as Executive Chef Dustin Falcon (Lazy Bear, The French Laundry) and his team prepare steaks to perfection. At Niku, there is a true marriage of American and Japanese sensibilities. Falcon’s cooking is driven by the terroir of Northern California — which finds its way onto the menu through foraged ingredients and products from local farmers — met with the highest quality domestic and A5 Japanese Beef.",url:"https://www.opentable.com/r/niku-steakhouse-san-francisco",lat:37.7808925,lng:-122.4009518},
  {name:"Rich Table",cuisine:"Californian",neighborhood:"Western Addition",city:"San Francisco",description:"Modern creativity and traditional technique combine seamlessly at Rich Table, a Northern Californian neighborhood restaurant. Chefs and Owners Evan and Sarah Rich have created a dressed-down interpretation of a fine dining restaurant, based on their extensive backgrounds in San Francisco's best restaurants. At Rich Table, they deliver an expert approach in a casual setting. Rich Table's menu, wine list and cocktail program all showcase a seasonal San Francisco style. The team looks forward to having you join them at their table.",url:"https://www.opentable.com/r/rich-table-san-francisco",lat:37.7748933,lng:-122.4227372},
  {name:"Bodega SF",cuisine:"Vietnamese",neighborhood:"Financial District / Embarcadero",city:"San Francisco",description:"Bodega SF is an evolution of Matthew Ho’s family's restaurant, Bodega Bistro, which operated from 2003-2017 out of San Francisco’s Tenderloin District, serving traditional Northern Vietnamese cuisine. The brand’s success continued as Ho organized pop-up events, eventually transitioning to meal packages throughout the pandemic to meet demand. In 2022, Ho and his partners opened Bodega SF’s brick-and-mortar location, again located in the Tenderloin District, bringing high-quality Vietnamese cuisine back to the community with a modernized, casual fine dining experience. The family-style concept allows visitors to sample its variety of authentic, creative dishes.",url:"https://www.opentable.com/r/bodega-sf-san-francisco",lat:37.785,lng:-122.413},
  {name:"Angler San Francisco",cuisine:"American",neighborhood:"Financial District / Embarcadero",city:"San Francisco",description:"Angler is a seafood focused, Michelin-starred restaurant from Saison Hospitality on the Embarcadero waterfront with views of an expansive wood burning hearth and the San Francisco Bay. Led by Chef de Cuisine Joe Hou (NoMad, Per Se, Bird Dog, Le Fantastique, The Line Hotel), Angler’s sourcing is deliberate and seasonal. Every dish is touched by fire and intended to be shared, all complemented by an award-winning wine list.Angler serves lunch, dinner, happy hour, and a nightly Cook For You experience. Angler’s Game Room hosts frequent wine dinners and is available for private dining and events.",url:"https://www.opentable.com/r/angler-san-francisco",lat:37.793083,lng:-122.392177},
  {name:"Gary Danko",cuisine:"Contemporary French / American",neighborhood:"Fisherman's Wharf",city:"San Francisco",description:"Twenty-six years after opening its doors in San Francisco’s iconic Fisherman’s Wharf neighborhood, Restaurant Gary Danko continues to refine its award-winning combination of classic French cooking, thoughtful and inventive use of local ingredients and personable yet impeccable service.This commitment to excellence and innovation has earned Restaurant Gary Danko a Grand Award from Wine Spectator, its Five Diamond rating from AAA as well as a coveted Relais & Châteaux designation. The restaurant has also earned several James Beard Awards, including Best New Restaurant, Best Service and Best Chef - California. In a warm, enveloping space overhung with fresh flowers and vibrant artworks, an evening at Gary Danko is both intimate and theatrical—a loving nod to an old-world dining experience with its heart thoroughly planted in the new: fresh, locally grown and raised foods drawn from the region’s vast seasonal offerings, prepared with precision and flair.",url:"https://www.opentable.com/gary-danko",lat:37.8058128,lng:-122.4205641},
  {name:"Californios",cuisine:"Mexican",neighborhood:"SOMA",city:"San Francisco",description:"We invite you to dine with us at Californios and experience a contemporary expression of Mexican cuisine using the bountiful ingredients of the Bay Area.  Californios is a family owned and operated California Mexican restaurant.  We opened our doors in the Mission District in 2015 and moved to our current location in 2020. With tall ceilings and a warm interior, our space allows for absolute comfort.  Val M. Cantú, chef and owner, and his team execute a deft and choreographed nightly tasting menu displaying the abundance of each season.  The wine, bar, and service team, pair and complement the cuisine at every turn.  We genuinely look forward to welcoming you in!",url:"https://www.opentable.com/r/californios-san-francisco",lat:37.7808925,lng:-122.4009518},
  {name:"little shucker",cuisine:"Seafood",neighborhood:"Pacific Heights",city:"San Francisco",description:"Wine, seafood, steak & seasonal dishes from The Snug team & Chef Adrian Garcia.The New York Times: “The 25 Best Restaurants in San Francisco Right Now; 2023, 2024”\"Hottest New Restaurants in San Francisco 2023\" -- Eater\"Best New Restaurants of 2023\" -- The Infatuation",url:"https://www.opentable.com/r/little-shucker-san-francisco",lat:37.7927171,lng:-122.4356445},
  {name:"Aziza",cuisine:"Moroccan",neighborhood:"Richmond District",city:"San Francisco",description:"Aziza, a Michelin-recommended restaurant, offers a captivating culinary journey through Morocco, reimagined with California's finest ingredients. Chef Mourad Lahlou's innovative dishes blend traditional Moroccan flavors with contemporary techniques, resulting in a truly unique dining experience. From classic tagines to modern interpretations, each dish is a masterpiece. Indulge in a diverse menu featuring organic and locally sourced ingredients, paired with creative cocktails and exquisite desserts. Immerse yourself in a warm and inviting atmosphere, where fine dining meets casual elegance.",url:"https://www.opentable.com/r/aziza-san-francisco",lat:37.7804147,lng:-122.4816652},
  {name:"Saison",cuisine:"American",neighborhood:"SOMA",city:"San Francisco",description:"Saison is a two-Michelin starred, open wood fire restaurant under the leadership of Executive Chef Richard Lee, emphasizing the bounty of California’s evolving terroir and its incredible farmers, ranchers, and fishermen and women. Saison is driven by Lee’s dedication to purity and innovation, paired with a Grand Award-winning wine list, in a dynamic space where guest and team celebrate an intimate, culture-shifting experience. Chef Lee builds upon Saison’s formidable foundation, crafting nuanced flavors with intention, inspired by the culinary diversity of Northern California.Saison has one of the country’s largest and most remarkable selections of Old and New World wine, with a special emphasis on Burgundy. Established by Saison Hospitality co-founder and Saison Winery winemaker Mark Bright, the list is now curated by Beverage & Service Director Molly Greene.",url:"https://www.opentable.com/r/saison-san-francisco-2",lat:37.7794954,lng:-122.3922179},
  {name:"Saison Cellar & Wine Bar - San Francisco",cuisine:"Wine Bar",neighborhood:"SOMA",city:"San Francisco",description:"Saison Wine Bar invites wine lovers or anyone thirsty to enjoy a vast list curated by Mark Bright and our team of Sommeliers, complemented by French wine bar fare. Our Wine Spectator award-winning collection is available by the glass, flight, or bottle, showcasing benchmark as well as niche labels, with deep verticals and highly allocated bottles. Quite often, selections are featured by the glass not available anywhere else! Our food menu is designed for groups large and small to snack and savor, from Croque Monsieurs and Pâté en Croûte, to our Signature Caviar Service and Steak Tartare, as well as a robust selection of Charcuterie and Cheese. We also host winemaker events regularly and are proudly part of the Saison Hospitality family! We offer the choice of either plush banquette or bar seating by reservation, though walk-ins are always welcome. Our team is here to taste, chat, or simply pass the time over a delicious glass. Cheers!",url:"https://www.opentable.com/r/saison-cellar-and-wine-bar-san-francisco",lat:37.7808925,lng:-122.4009518},
  {name:"Selby's",cuisine:"American",neighborhood:"Menlo Park",city:"San Francisco",description:"## Selby's: Where Culinary Artistry Meets Timeless Elegance  Step into Selby's, a haven of culinary artistry and timeless elegance in Redwood City. Here, Michelin-starred Chef Mark Sullivan orchestrates a symphony of flavors, blending modern American cuisine with classic European influences.  The opulent ambiance transports you to a bygone era. Plush velvet seating, glistening chandeliers, and rich mahogany accents create an atmosphere of sophisticated comfort. As you settle in, prepare to be captivated by the meticulous presentation of each dish, a testament to the chef's dedication to detail.  Indulge in Selby's signature dishes, like the melt-in-your-mouth Beef Wellington or the delicate Dover sole meunière. Each bite is a celebration of fresh, seasonal ingredients, expertly prepared to showcase their natural flavors.  Complement your meal with a selection from the extensive wine list, curated to enhance the flavors of the cuisine. The knowledgeable staff will guide you through the options, ensuring a harmonious pairing for every palate.  Selby's is more than just a restaurant; it's an experience. It's a place to celebrate special occasions, savor exquisite cuisine, and create lasting memories. So, come and discover the magic of Selby's, where every detail is",url:"https://www.opentable.com/r/selbys-redwood-city",lat:37.4535,lng:-122.181},
  {name:"Hilda and Jesse",cuisine:"Contemporary American",neighborhood:"North Beach",city:"San Francisco",description:"Hilda and Jesse is a queer owned brunch, dinner and event space located in San Francisco’s North Beach, offering modern #funluxury. With twists on the typical, Hilda and Jesse delivers unique options infused with a playful touch. Created by Chef Ollie Liedags and Rachel Sillcocks, Hilda and Jesse offers an innovative and intentional menu that calls on a wide variety of inspirations. Initially born out of their popular Brunch for Dinner pop-ups, the menu has grown and evolved to include dinner as well as their popular brunch. Not bound by tradition, the menu showcases sweet and savory plays on classic dishes reimagined, made with impeccably sourced ingredients and fine dining technique.Hilda and Jesse was awarded 1 Michelin Star and the award for Outstanding Service in California in 2024 and was delighted to retain its star in 2025.",url:"https://www.opentable.com/r/hilda-and-jesse-san-francisco",lat:37.8001073,lng:-122.4109558},
  {name:"Nisei",cuisine:"Japanese",neighborhood:"Russian Hill",city:"San Francisco",description:"Nisei presents a contemporary approach to Japanese American cuisine by combining deep Japanese flavors, refined cooking technique, and Northern California's finest ingredients. The restaurant is a personal reflection of Chef David Yoshimura's unique experience as a Michelin starred chef and second generation Japanese American, or Nisei. Nisei can accommodate most severe allergies with advance notice, however due to the nature of the tasting menu format, we can not meet all dietary restrictions or aversions. In order to maintain the spirit of our cuisine, the following items can not be removed: Salt, sugar, soy sauce, and egg cooked into items.All Experience prices below reflect a 20% Service Fee and 8.63% SF Sales Tax applied to the base price of each experience. This Service Fee goes towards paying our employees a livable wage as well as providing health insurance.",url:"https://www.opentable.com/r/nisei-san-francisco",lat:37.8000729,lng:-122.417094},
  {name:"O' by Claude Le Tohic",cuisine:"Contemporary French",neighborhood:"Downtown / Union Square",city:"San Francisco",description:"Located on the 5th floor of ONE65 San Francisco, O' is Chef Claude Le Tohic's inaugural solo venture after earning Meilleur Ouvrier de France, winning the James Beard Award for Best Chef in America and carrying the coveted 3-Michelin star rating at Joël Robuchon Las Vegas. Luxurious but not pretentious, O’ offers modern French cuisine with elegant and attentive service. O' offers a 5-course Tasting Menu for $210, and a 9-course Grand Tasting Menu for $295. Optional wine pairings are available, along with a wine list of 1000+ selections from the USA and France.  Please note that 20% service charge (which includes gratuity) and 3% San Francisco Health Mandate is added onto every check.Though dinner attire is always encouraged, we ask our guests to abide by \"smart casual\" dress code; no shorts, t-shirts, or sandals.",url:"https://www.opentable.com/r/o-by-claude-le-tohic-san-francisco",lat:37.7898562,lng:-122.4195684},
  {name:"SingleThread Restaurant & Inn",cuisine:"Californian",neighborhood:"Healdsburg",city:"San Francisco",description:"In the heart of downtown Healdsburg, one of the country’s most accomplished chefs Kyle Connaughton, along with farmer and wife Katina Connaughton, host guests at SingleThread Farm-Restaurant-Inn, a 55-seat fine dining restaurant with five exclusive suites above the restaurant. The farm, located on 24 acres in the historic Dry Creek Valley, supplies vegetables, fruit, herbs, flowers and honey, to their restaurant. Guests of the restaurant are treated to a 10-course tasting menu, showcasing the seasonal bounty from the couple’s farm. SingleThread provides guests a bespoke hospitality experience in the center of Sonoma Wine Country.",url:"https://www.opentable.com/r/singlethreadfarms",lat:38.6108,lng:-122.868},
  {name:"Chez Noir",cuisine:"French",neighborhood:"Carmel",city:"San Francisco",description:"Chez Noir is Jonny and Monique’s love letter to Monterey County, celebrating its finest ingredients. We offer a $165 four-course menu in the dining room and on our patio. Our wine program focuses on independent producers, with  an all California wine pairing, and select bottles from the West Coast, Spain and France. A cancellation fee of $165 per person will be charged to parties who cancel less than 48 hours before their reservation. This policy applies to reductions in party size.Please note that Chez Noir is designed for adults. While we leave the decision to bring children up to the discretion of the parents, it is essential that all guests, no matter how small, be included in the guest count. We do not offer off-menu dishes or high chairs. We do not have a phone; for more info, please email info@cheznoircarmel.com. Each month’s reservations are released on the 1st of the preceding month at 9am PST; i.e. all November reservations will be released on the 1st of October.",url:"https://www.opentable.com/r/chez-noir-carmel-by-the-sea",lat:37.7608104,lng:-122.449707},
  {name:"PRESS Restaurant",cuisine:"American",neighborhood:"St. Helena",city:"San Francisco",description:"PRESS Restaurant celebrates Napa Valley — the people, the ingredients, and the wines. PRESS is a place for locals, winemakers, vintners, and guests from around the world to experience the best the Napa Valley has to offer — it’s this sense of community that is at the heart of everything PRESS does. Under the leadership of Samantha Rudd and Chef Philip Tessier, PRESS features legendary Bay Area purveyors alongside innovative new culinary talents to highlight Napa Valley cuisine. The PRESS Culinary Team draws inspiration from around the globe while staying rooted in the style and ingredients that make the Napa Valley so special. Following through on the Rudd family’s vision, PRESS is home to the largest collection of Napa Valley wines in the world. The Napa Valley-focused wine list celebrates current vintages as well as older wines going back over 70 years with over 2,700 unique selections. PRESS received its first Michelin Star in 2022 and the Wine Spectator Grand Award in 2023.",url:"https://www.opentable.com/r/press-restaurant-st-helena",lat:37.7364581,lng:-122.4042032},
  {name:"Ella Dining Room and Bar",cuisine:"Contemporary American",neighborhood:"Sacramento",city:"San Francisco",description:"From the family behind The Kitchen, OBO' Italian Table & Bar, and Sellands Cafe & Bar, Ella Dining Room and Bar is a Downtown Sacramento landmark and premier dining destination. Ella offers New American, farm-to-fork cuisine for lunch and dinner, featuring seafood, steaks, pastas, small plates, fresh oysters, and traditional caviar service. Guests can also enjoy wine from an award-winning wine list and seasonal, hand-crafted cocktails at Ella's renowned bar.Ella specializes in private parties, with versatile spaces for gatherings of all sizes and a dedicated events team to help plan every detail.Located within walking distance of the Convention Center, State Capitol, Golden 1 Center, and major theaters and hotels, Ella also provides convenient valet service for shows and events.",url:"https://www.opentable.com/ella-dining-room-and-bar",lat:37.7897234,lng:-122.4339172},
  {name:"Canon",cuisine:"American",neighborhood:"Sacramento",city:"San Francisco",description:"Michelin Guide rated neighborhood restaurant with creative and shareable cuisine and a year-round patio.\"With a clear vision, a striking aesthetic and distinctive, mouthwatering flavors, Canon restaurant in East Sacramento is a stellar and welcome addition to the city’s dining scene.\" - 4-Stars, Sacramento Bee \"Find the convivial Canon sequestered away from the downtown bustle. This cool space that contrasts deep tones against bright whites is enveloped by the aromatic smell of smoke, so it’s no surprise that the house is packed most nights. Chef Brad Cecchi is the culinary mastermind and his menu is pivoted around playful small plates.\" - Michelin Guide",url:"https://www.opentable.com/r/canon-sacramento",lat:37.7897234,lng:-122.4339172},
  {name:"Camden Spit and Larder",cuisine:"American",neighborhood:"Sacramento",city:"San Francisco",description:"Camden Spit & Larder, a modern London-inspired eatery, in Downtown Sacramento on Capitol Mall. Chef Oliver Ridgeway showcases the pristine ingredients of the surrounding region with its bold design, bustling bar scene, and prime private dining facilities. Camden is comfortable yet elevated. We are located just a few blocks from the Capitol and Convention Center and just steps from the Golden 1 Center. This is the perfect place to dine pre-show or concert. Camden S&L was a restaurant 'Recognized by Michelin' in 2021, 2022, 2023, 2024 & 2025.",url:"https://www.opentable.com/r/camden-spit-and-larder-sacramento",lat:37.7897234,lng:-122.4339172},
  {name:"Dolly Olive & Bar Dolly",cuisine:"Italian",neighborhood:"Downtown",city:"Portland",description:"Located in the heart of Downtown Portland, OR on the bustling corner of SW Alder & SW 12th, Dolly Olive & Bar Dolly center around Southern Mediterranean ingredients and flavors, with an emphasis on an in house bakery program, fresh made pastas, and Italian aperitifs. Dolly Olive sports an inviting atmosphere featuring soft leather banquettes, warm wood accents, and custom patterned tiles. Bar Dolly shares a kitchen with Dolly Olive and serves as a companion 21+ bar to next door to Dolly Olive. Bar Dolly offers an extensive collection of Mediterranean wines, cocktails and regional dishes. Bar Dolly offers the same food menu as Dolly Olive.We're currently serving dinner daily, with brunch and a midday aperitivo hour on weekends. Whether you're stopping in for a pre-show dinner, celebrating a special event in your life, or just popping in for a quick bite, you can expect an excellent experience, start to finish.",url:"https://www.opentable.com/r/dolly-olive-portland",lat:45.5152744,lng:-122.680025},
  {name:"Oma's Hideaway",cuisine:"Indonesian / Malaysian",neighborhood:"Southeast Portland",city:"Portland",description:"Oma's Hideaway is a vibrant, maximalist restaurant inspired by the life and spirit of Chef Thomas Pisha Duffly's grandmother, Kiong Tien “Tina” Vandenberg. Her ability to adapt, to make the most out of limited resources, and to stay creative while projecting warmth and brightness is the guiding force behind Oma’s Hideaway.Born during the pandemic as a pop-up in the Gado Gado parking lot, Oma’s became a permanent beacon of iridescent light in Portland’s Richmond neighborhood in 2021. The menu draws from Tina’s life story, taking influence from the craveable, soul-satisfying hawker food of Singapore and Malaysia and “turning up the volume” with exaggerated yet balanced flavors in Chef Tom’s signature style. Oma’s serves dinner accompanied by a seasonal list of hand-crafted cocktails and zero-proof drinks.",url:"https://www.opentable.com/r/omas-hideaway-portland",lat:45.5049414,lng:-122.6328706},
  {name:"Jeju",cuisine:"Korean",neighborhood:"Southeast Portland",city:"Portland",description:"Please note: We kindly ask that large parties of 6 or more participate in our Chef's Tasting Menu.Korean-American cuisine with a focus on wood-fired cooking techniques and whole-animal butchery, Jeju Restaurant is the newest addition to the Han Oak family of restaurants by Chef Peter Cho and Sun Young Park.",url:"https://www.opentable.com/r/jeju-portland",lat:45.4989544,lng:-122.5792268},
  {name:"Shalom Y'all",cuisine:"Mediterranean",neighborhood:"Southeast Portland",city:"Portland",description:"Shalom Y'all is an exploration and celebration of the Levant. We combines flavors and dishes from the Eastern Mediterranean, North Africa, and the Middle East with the produce and proteins of the Pacific Northwest to produce a phenomenal menu. Some standout items include the grilled lamb chops in Greek vinaigrette, the Baharat spiced chicken kebab served over mejadara, and our silky hummus served with fresh baked pita.Shalom Y'all is located in the heart of Eastside Portland, Oregon and boasts a charming, industrial atmosphere featuring exposed cement walls flanked by warm wooden accents. You'll experience innovative yet approachable cuisine, an inspired menu of cocktails and beverages, all in a lively atmosphere.We are currently reserving seating in our Dining Room, our Bar (21+), and our Chef's Counter.",url:"https://www.opentable.com/r/shalom-yall-portland",lat:45.5152289,lng:-122.6645578},
  {name:"Canard - Burnside",cuisine:"Contemporary American",neighborhood:"Northeast Portland",city:"Portland",description:"Wine bar meets casual eatery in the heart of Portland's Central East Side. From the team that brought you Le Pigeon.",url:"https://www.opentable.com/r/canard-burnside-portland",lat:45.5261935,lng:-122.5903323},
  {name:"Arden",cuisine:"Contemporary American",neighborhood:"Northwest Portland",city:"Portland",description:"Arden is an idyllic retreat tucked into Portland's Pearl District. Arden delivers seasonal Pacific Northwest cuisine and an award-winning wine program featuring over 250 bottles, many with bottle age. Guests have the option to dine a la carte or enjoy the chef's prix fixe menu ($75): a shared experience that features 4 courses of seasonal cuisine. Coursed wine pairings are also available ($50). Arden is named in homage to Shakespeare's famous forest - a place to escape the hustle and bustle of the city and appreciate nature's bounty and beauty. The restaurant invites you to take an exiting culinary adventure through the Pacific Northwest, and explore the incredible range of ingredients that the region has to offer.",url:"https://www.opentable.com/r/arden-portland",lat:45.5260721,lng:-122.6814203},
  {name:"L'Orange",cuisine:"Mediterranean",neighborhood:"Southeast Portland",city:"Portland",description:"Named one of the New York Times America's Best Restaurants 2024! Tucked away upstairs in a charming old storefront and voted one of Portland's 'Best New Restaurants' in 2023, L'Orange features an intimate dining space that beckons you to immerse yourself in a different era. Chef Joel Stocks and his talented team will guide your palate through adventurous dishes that blend European culinary traditions with the finest local ingredients. Experience the taste of \"Old Portland\" with every bite. Enhance your dining experience with a thoughtfully curated selection of wines, personally chosen by Owner/Winemaker Jeff Vejr and his team. While our wine list boasts a European focus, we also showcase a variety of local wines, including the exceptional offerings from Jeff's own Golden Cluster label. Join us at L'Orange for a taste of history, innovation, and the vibrant flavors of the Pacific Northwest!",url:"https://www.opentable.com/r/lorange-portland",lat:45.4989544,lng:-122.5792268},
  {name:"Nodoguro",cuisine:"Japanese Speciality",neighborhood:"Downtown",city:"Portland",description:"Nodoguro is a Japanese specialty restaurant in the heart of Portland. Your dinner follows the rhythms of kaiseki (Japan’s seasonal tasting tradition) reimagined through the ingredients and spirit of the Pacific Northwest. The meal unfolds slowly across 20 courses, from delicate vegetables and raw seafood to warm broths, steamed dishes, grilled bites, and a deeply flavorful rice and sushi courses.",url:"https://www.opentable.com/r/nodoguro-portland",lat:45.5205462,lng:-122.6792141},
  {name:"Han Oak",cuisine:"Korean",neighborhood:"Northeast Portland",city:"Portland",description:"Han Oak has launched it's Spring Menu! Chef Peter Cho's take on jipbap, home-style cooking inspired by the bounty of Oregon. Expect a table full of banchan and sizzling entrees, rooted in Korean culture. Han Oak is a communal, prix-fixe Korean restaurant emphasizing traditional flavors, seasonal ingredients, and fine technique. From their addictive hot pot to their mouthwatering dumplings, every bite at Han Oak is a taste of pure happiness.Book a later reservation and ask about our full-on karaoke setup! Karaoke may or may not happen but if you see the disco lights and the fog machine on, get in the queue!",url:"https://www.opentable.com/r/han-oak-portland",lat:45.5268768,lng:-122.6418613},

var cityColors = {
  "Chicago": "#2563eb",
  "Los Angeles": "#ea580c",
  "New York City": "#dc2626",
  "Portland": "#7c3aed",
  "San Francisco": "#16a34a"
};

var map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

var clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false
});

var markerMap = {};
restaurants.forEach(function(r, i) {
  if (r.lat == null || r.lng == null) return; // skip ungeocoded
  var color = cityColors[r.city] || '#666';
  var icon = L.divIcon({
    className: 'custom-marker',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color + ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });

  var desc = r.description.length > 150 ? r.description.substring(0, 150) + '...' : r.description;

  var popupEl = document.createElement('div');
  var pName = document.createElement('div');
  pName.className = 'popup-name';
  pName.textContent = r.name;
  popupEl.appendChild(pName);
  var pCuisine = document.createElement('div');
  pCuisine.className = 'popup-cuisine';
  pCuisine.textContent = r.cuisine;
  popupEl.appendChild(pCuisine);
  var pHood = document.createElement('div');
  pHood.className = 'popup-hood';
  pHood.textContent = r.neighborhood + ', ' + r.city;
  popupEl.appendChild(pHood);
  var pDesc = document.createElement('div');
  pDesc.className = 'popup-desc';
  pDesc.textContent = desc;
  popupEl.appendChild(pDesc);
  var pLink = document.createElement('a');
  pLink.className = 'popup-link';
  pLink.href = r.url;
  pLink.target = '_blank';
  pLink.rel = 'noopener';
  pLink.textContent = 'View on OpenTable';
  popupEl.appendChild(pLink);

  var marker = L.marker([r.lat, r.lng], { icon: icon }).bindPopup(popupEl);
  marker.on('click', function() { highlightCard(i); });
  markerMap[i] = marker;
  clusterGroup.addLayer(marker);
});
map.addLayer(clusterGroup);

var allCoords = restaurants.filter(function(r) { return r.lat != null; }).map(function(r) { return [r.lat, r.lng]; });
if (allCoords.length > 0) map.fitBounds(allCoords, { padding: [30, 30] });

// Populate cuisine filter
var cuisineSet = {};
restaurants.forEach(function(r) { cuisineSet[r.cuisine] = true; });
var cuisines = Object.keys(cuisineSet).sort();
var cuisineSelect = document.getElementById('cuisine-filter');
cuisines.forEach(function(c) {
  var opt = document.createElement('option');
  opt.value = c;
  opt.textContent = c;
  cuisineSelect.appendChild(opt);
});

var activeCity = 'all';
var activeCuisine = 'all';

function getCityClass(city) {
    if (city === 'Chicago') return 'city-Chicago';
    if (city === 'Los Angeles') return 'city-LA';
    if (city === 'New York City') return 'city-NYC';
    if (city === 'Portland') return 'city-Portland';
    if (city === 'San Francisco') return 'city-SF';
    return '';
}

function getFilteredIndices() {
  var result = [];
  restaurants.forEach(function(r, i) {
    var cityMatch = activeCity === 'all' || r.city === activeCity;
    var cuisineMatch = activeCuisine === 'all' || r.cuisine === activeCuisine;
    if (cityMatch && cuisineMatch) result.push(i);
  });
  return result;
}

function render() {
  var indices = getFilteredIndices();
  document.getElementById('count').textContent = indices.length;
  document.getElementById('total').textContent = restaurants.length;

  clusterGroup.clearLayers();
  indices.forEach(function(i) { if (markerMap[i]) clusterGroup.addLayer(markerMap[i]); });

  if (indices.length > 0) {
    var coords = indices.filter(function(i) { return markerMap[i]; }).map(function(i) { return [restaurants[i].lat, restaurants[i].lng]; });
    if (coords.length > 0) map.fitBounds(coords, { padding: [30, 30], maxZoom: 14 });
  }

  var list = document.getElementById('restaurant-list');
  list.textContent = '';
  indices.forEach(function(i) {
    var r = restaurants[i];
    var card = document.createElement('div');
    card.className = 'restaurant-card ' + getCityClass(r.city);
    card.dataset.index = i;

    var nameDiv = document.createElement('div');
    nameDiv.className = 'card-name';
    var dot = document.createElement('span');
    dot.className = 'city-dot';
    dot.style.background = cityColors[r.city] || '#666';
    nameDiv.appendChild(dot);
    nameDiv.appendChild(document.createTextNode(r.name));
    card.appendChild(nameDiv);

    var metaDiv = document.createElement('div');
    metaDiv.className = 'card-meta';
    metaDiv.textContent = r.neighborhood + ', ' + r.city;
    card.appendChild(metaDiv);

    var cuisineSpan = document.createElement('span');
    cuisineSpan.className = 'card-cuisine';
    cuisineSpan.textContent = r.cuisine;
    card.appendChild(cuisineSpan);

    card.addEventListener('click', (function(idx, rest) {
      return function() {
        if (!markerMap[idx]) return;
        clusterGroup.zoomToShowLayer(markerMap[idx], function() {
          markerMap[idx].openPopup();
        });
        map.setView([rest.lat, rest.lng], Math.max(map.getZoom(), 14));
        highlightCard(idx);
      };
    })(i, r));

    list.appendChild(card);
  });
}

function highlightCard(index) {
  var cards = document.querySelectorAll('.restaurant-card');
  for (var j = 0; j < cards.length; j++) cards[j].classList.remove('active');
  var card = document.querySelector('.restaurant-card[data-index="' + index + '"]');
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

document.querySelectorAll('.city-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.city-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeCity = btn.dataset.city;
    render();
  });
});

cuisineSelect.addEventListener('change', function() {
  activeCuisine = cuisineSelect.value;
  render();
});

render();
</script>
</body>
</html>
